<!DOCTYPE html>
<html>
<head>
  <title>My Orders | RentEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    /* ============================================
       MODERN ORDERS PAGE - UNIQUE DESIGN
       Premium look with smooth animations
       ============================================ */

    /* CSS Variables for easy theming */
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --secondary: #8b5cf6;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --dark: #1e293b;
      --light: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;
      
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
      min-height: 100vh;
      color: var(--dark);
    }

    /* ================= MODERN NAVBAR ================= */
    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: var(--shadow-md);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
    }

    .navbar h2 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .nav-right {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .nav-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      text-decoration: none;
      padding: 0.6rem 1.5rem;
      border-radius: var(--radius-full);
      font-weight: 600;
      font-size: 0.95rem;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-btn i {
      font-size: 1rem;
    }

    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    /* ================= PAGE HEADER ================= */
    .page-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 2rem 2rem;
      margin: 2rem 2rem 0;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }

    .page-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: rotate 30s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .page-header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      position: relative;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .page-header h1 i {
      font-size: 2rem;
      opacity: 0.9;
    }

    .page-header p {
      font-size: 1rem;
      opacity: 0.9;
      position: relative;
    }

    /* ================= MAIN CONTAINER ================= */
    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    /* ================= SEARCH SECTION ================= */
    .search-section {
      background: white;
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--gray-200);
    }

    .search-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .search-title i {
      color: var(--primary);
    }

    .search-bar {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .date-input-wrapper {
      flex: 2;
      min-width: 250px;
      position: relative;
    }

    .date-input-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      font-size: 1rem;
    }

    .search-bar input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-lg);
      font-size: 1rem;
      transition: var(--transition);
      background: white;
    }

    .search-bar input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-light);
    }

    .btn-group {
      display: flex;
      gap: 0.8rem;
      flex: 1;
    }

    .search-bar button {
      padding: 0.9rem 1.8rem;
      border: none;
      border-radius: var(--radius-lg);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex: 1;
    }

    .btn-search {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: var(--shadow-sm);
    }

    .btn-search:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-reset {
      background: white;
      color: var(--gray-500);
      border: 2px solid var(--gray-200) !important;
    }

    .btn-reset:hover {
      background: var(--gray-100);
      border-color: var(--gray-300) !important;
    }

    /* ================= ORDERS GRID ================= */
    .orders-grid {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ================= ORDER CARD ================= */
    .order-card {
      background: white;
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      box-shadow: var(--shadow-md);
      transition: var(--transition);
      border: 1px solid var(--gray-200);
      position: relative;
      overflow: hidden;
    }

    .order-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
      border-color: var(--primary-light);
    }

    .order-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, var(--primary), var(--secondary));
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.2rem;
      padding-bottom: 1rem;
      border-bottom: 2px dashed var(--gray-200);
    }

    .order-info {
      flex: 1;
    }

    .order-id {
      font-size: 0.9rem;
      color: var(--gray-500);
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .order-id i {
      color: var(--primary);
      font-size: 0.9rem;
    }

    .order-id span {
      font-family: monospace;
      background: var(--gray-100);
      padding: 0.2rem 0.5rem;
      border-radius: var(--radius-sm);
    }

    .order-date {
      font-size: 0.9rem;
      color: var(--gray-600);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .order-date i {
      color: var(--gray-400);
    }

    .status-badge {
      padding: 0.5rem 1.2rem;
      border-radius: var(--radius-full);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: var(--shadow-sm);
    }

    .status-badge i {
      font-size: 0.8rem;
    }

    .status-pending {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
    }

    .status-paid {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status-failed {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .status-processing {
      background: #cce5ff;
      color: #004085;
      border: 1px solid #b8daff;
    }

    .status-delivered {
      background: #d1e7dd;
      color: #0f5132;
      border: 1px solid #badbcc;
    }

    .order-items {
      margin: 1.2rem 0;
      background: var(--gray-100);
      border-radius: var(--radius-lg);
      padding: 1rem;
    }

    .items-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .items-title i {
      color: var(--primary);
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--gray-200);
    }

    .item-row:last-child {
      border-bottom: none;
    }

    .item-name {
      font-weight: 500;
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .item-name i {
      color: var(--primary);
      font-size: 0.9rem;
    }

    .item-details {
      color: var(--gray-600);
      font-size: 0.9rem;
      display: flex;
      gap: 1rem;
    }

    .item-details span {
      background: white;
      padding: 0.2rem 0.6rem;
      border-radius: var(--radius-full);
      border: 1px solid var(--gray-200);
    }

    .order-total {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 2px solid var(--gray-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.1rem;
    }

    .total-label {
      font-weight: 600;
      color: var(--gray-600);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .total-amount {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background: white;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
    }

    .empty-state i {
      font-size: 4rem;
      color: var(--gray-300);
      margin-bottom: 1rem;
    }

    .empty-state p {
      color: var(--gray-500);
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }

    .empty-state .btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      text-decoration: none;
      border-radius: var(--radius-full);
      font-weight: 600;
    }

    /* ================= RESPONSIVE DESIGN ================= */

    /* Tablet (768px - 1024px) */
    @media screen and (max-width: 1024px) {
      .navbar {
        padding: 1rem 1.5rem;
      }
      
      .page-header {
        margin: 1.5rem 1.5rem 0;
        padding: 1.5rem;
      }
      
      .page-header h1 {
        font-size: 2rem;
      }
      
      .container {
        padding: 0 1.5rem;
      }
    }

    /* Mobile Landscape (640px - 768px) */
    @media screen and (max-width: 768px) {
      .navbar {
        padding: 1rem;
      }
      
      .navbar h2 {
        font-size: 1.5rem;
      }
      
      .nav-btn span {
        display: none;
      }
      
      .nav-btn i {
        margin: 0;
      }
      
      .page-header {
        margin: 1rem 1rem 0;
        padding: 1.2rem;
      }
      
      .page-header h1 {
        font-size: 1.5rem;
      }
      
      .page-header h1 i {
        font-size: 1.5rem;
      }
      
      .container {
        padding: 0 1rem;
      }
      
      .search-bar {
        flex-direction: column;
      }
      
      .date-input-wrapper {
        width: 100%;
      }
      
      .btn-group {
        width: 100%;
      }
      
      .order-header {
        flex-direction: column;
        gap: 1rem;
      }
      
      .status-badge {
        align-self: flex-start;
      }
      
      .item-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
      
      .item-details {
        width: 100%;
        justify-content: flex-start;
      }
    }

    /* Mobile Portrait (480px and below) */
    @media screen and (max-width: 480px) {
      .navbar {
        padding: 0.8rem;
      }
      
      .navbar h2 {
        font-size: 1.3rem;
      }
      
      .page-header {
        margin: 0.8rem 0.8rem 0;
        padding: 1rem;
      }
      
      .page-header h1 {
        font-size: 1.2rem;
      }
      
      .search-section {
        padding: 1rem;
      }
      
      .order-card {
        padding: 1.2rem;
      }
      
      .order-id {
        font-size: 0.8rem;
      }
      
      .order-id span {
        max-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      
      .total-amount {
        font-size: 1.1rem;
      }
      
      .btn-group {
        flex-direction: column;
      }
    }

    /* Small Mobile (360px and below) */
    @media screen and (max-width: 360px) {
      .navbar h2 {
        font-size: 1.1rem;
      }
      
      .page-header h1 {
        font-size: 1rem;
      }
      
      .order-id span {
        max-width: 80px;
      }
    }

    /* Landscape Mode */
    @media screen and (orientation: landscape) and (max-height: 600px) {
      .navbar {
        padding: 0.6rem 1rem;
      }
      
      .page-header {
        margin: 0.8rem 0.8rem 0;
        padding: 1rem;
      }
    }

    /* Dark Mode Support */
    @media (prefers-color-scheme: dark) {
      :root {
        --dark: #f1f5f9;
        --light: #0f172a;
        --gray-100: #1e293b;
        --gray-200: #334155;
        --gray-300: #475569;
        --gray-400: #64748b;
        --gray-500: #94a3b8;
      }
      
      body {
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      }
      
      .navbar, .search-section, .order-card, .empty-state {
        background: #1e293b;
      }
      
      .search-bar input {
        background: #0f172a;
        color: white;
        border-color: #334155;
      }
      
      .item-row {
        border-bottom-color: #334155;
      }
      
      .order-items {
        background: #0f172a;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h2>RentEase</h2>
    <div class="nav-right">
      <a href="products.html" class="nav-btn">
        <i class="fas fa-store"></i>
        <span>Products</span>
      </a>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>
      <i class="fas fa-shopping-bag"></i>
      My Orders
    </h1>
    <p>Track and manage all your rental orders</p>
  </div>

  <div class="container">

    <!-- Search Section -->
    <div class="search-section">
      <div class="search-title">
        <i class="fas fa-filter"></i>
        Filter Orders
      </div>
      <div class="search-bar">
        <div class="date-input-wrapper">
          <i class="fas fa-calendar"></i>
          <input type="date" id="dateFilter" placeholder="Select date">
        </div>
        <div class="btn-group">
          <button onclick="filterOrders()" class="btn-search">
            <i class="fas fa-search"></i>
            Search
          </button>
          <button onclick="loadOrders()" class="btn-reset">
            <i class="fas fa-redo-alt"></i>
            Reset
          </button>
        </div>
      </div>
    </div>

    <!-- Orders Container -->
    <div id="ordersContainer" class="orders-grid">
      <div class="empty-state">
        <i class="fas fa-box-open"></i>
        <p>Loading your orders...</p>
      </div>
    </div>

  </div>


<script>
const API_URL = "https://rentease3-backend.onrender.com";
let allOrders = [];

// ============================================
// LOAD ORDERS FROM API
// ============================================
async function loadOrders() {
  const token = localStorage.getItem("token");
  
  // Check if user is logged in
  if (!token) {
    showError("Please login to view your orders", "login");
    return;
  }

  try {
    // Show loading state
    showLoading();

    const res = await fetch(`${API_URL}/api/orders`, {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if (!res.ok) {
      throw new Error(`Failed to fetch orders: ${res.status}`);
    }

    const data = await res.json();
    allOrders = data;
    displayOrders(allOrders);
    
  } catch (error) {
    console.error("Error loading orders:", error);
    showError("Failed to load orders. Please try again.", "retry");
  }
}

// ============================================
// DISPLAY ORDERS
// ============================================
function displayOrders(orders) {
  const container = document.getElementById("ordersContainer");
  
  if (!container) return;

  // Empty state
  if (orders.length === 0) {
    container.innerHTML = getEmptyStateHTML();
    return;
  }

  // Build HTML for all orders
  let ordersHTML = '';
  
  orders.forEach(order => {
    const status = order.paymentStatus || "pending";
    const { statusClass, statusIcon } = getStatusConfig(status);
    
    ordersHTML += `
      <div class="order-card">
        <div class="order-header">
          <div class="order-info">
            <div class="order-id">
              <i class="fas fa-hashtag"></i>
              <span>${order._id}</span>
            </div>
            <div class="order-date">
              <i class="far fa-calendar-alt"></i>
              ${formatDate(order.createdAt)}
            </div>
          </div>
          <div class="status-badge ${statusClass}">
            <i class="fas ${statusIcon}"></i>
            ${status.toUpperCase()}
          </div>
        </div>

        <div class="order-items">
          <div class="items-title">
            <i class="fas fa-box"></i>
            Order Items
          </div>
          ${generateItemsHTML(order.items)}
        </div>

        <div class="order-total">
          <span class="total-label">
            <i class="fas fa-calculator"></i>
            Total Amount
          </span>
          <span class="total-amount">₹${order.totalAmount}</span>
        </div>
      </div>
    `;
  });

  container.innerHTML = ordersHTML;
}

// ============================================
// HELPER FUNCTIONS
// ============================================

// Format date to readable string
function formatDate(dateString) {
  const date = new Date(dateString);
  return date.toLocaleString('en-IN', {
    day: 'numeric',
    month: 'short',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}

// Get status badge configuration
function getStatusConfig(status) {
  const configs = {
    pending: { class: "status-pending", icon: "fa-clock" },
    paid: { class: "status-paid", icon: "fa-check-circle" },
    completed: { class: "status-paid", icon: "fa-check-circle" },
    failed: { class: "status-failed", icon: "fa-times-circle" },
    processing: { class: "status-processing", icon: "fa-spinner fa-spin" },
    delivered: { class: "status-delivered", icon: "fa-truck" }
  };
  
  return configs[status] || configs.pending;
}

// Generate HTML for order items
function generateItemsHTML(items) {
  if (!items || items.length === 0) {
    return '<p class="no-items">No items in this order</p>';
  }

  return items.map(item => `
    <div class="item-row">
      <div class="item-name">
        <i class="fas fa-tag"></i>
        ${item.product?.name || "Product"}
      </div>
      <div class="item-details">
        <span><i class="fas fa-sort-amount-up"></i> Qty: ${item.quantity}</span>
        <span><i class="fas fa-rupee-sign"></i> ₹${item.price}</span>
      </div>
    </div>
  `).join('');
}

// Get empty state HTML
function getEmptyStateHTML() {
  return `
    <div class="empty-state">
      <i class="fas fa-box-open"></i>
      <p>No orders found</p>
      <a href="products.html" class="empty-state-btn">
        <i class="fas fa-store"></i> Browse Products
      </a>
    </div>
  `;
}

// Show loading state
function showLoading() {
  const container = document.getElementById("ordersContainer");
  if (container) {
    container.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Loading your orders...</p>
      </div>
    `;
  }
}

// Show error state
function showError(message, action = "retry") {
  const container = document.getElementById("ordersContainer");
  if (!container) return;

  let actionButton = '';
  
  if (action === "login") {
    actionButton = '<a href="login.html" class="empty-state-btn"><i class="fas fa-sign-in-alt"></i> Go to Login</a>';
  } else {
    actionButton = '<button onclick="loadOrders()" class="empty-state-btn"><i class="fas fa-redo-alt"></i> Try Again</button>';
  }

  container.innerHTML = `
    <div class="empty-state">
      <i class="fas fa-exclamation-circle" style="color: #ef4444;"></i>
      <p>${message}</p>
      ${actionButton}
    </div>
  `;
}

// ============================================
// FILTER ORDERS BY DATE
// ============================================
function filterOrders() {
  const selectedDate = document.getElementById("dateFilter").value;
  
  if (!selectedDate) {
    alert("Please select a date");
    return;
  }

  const filtered = allOrders.filter(order => {
    const orderDate = new Date(order.createdAt)
      .toISOString()
      .split("T")[0];
    return orderDate === selectedDate;
  });

  displayOrders(filtered);
  
  // Show filter summary
  const filterSummary = document.createElement('div');
  filterSummary.className = 'filter-summary';
  filterSummary.innerHTML = `
    <i class="fas fa-filter"></i>
    Showing orders from ${formatDate(selectedDate)}
    <button onclick="loadOrders()" class="clear-filter">
      <i class="fas fa-times"></i> Clear
    </button>
  `;
  
  // Add filter summary to page
  const existingSummary = document.querySelector('.filter-summary');
  if (existingSummary) existingSummary.remove();
  
  const searchSection = document.querySelector('.search-section');
  searchSection.appendChild(filterSummary);
}

// ============================================
// RESET FILTERS
// ============================================
function resetFilters() {
  document.getElementById("dateFilter").value = '';
  displayOrders(allOrders);
  
  // Remove filter summary
  const filterSummary = document.querySelector('.filter-summary');
  if (filterSummary) filterSummary.remove();
}

// ============================================
// AUTO-LOAD ORDERS ON PAGE LOAD
// ============================================
document.addEventListener('DOMContentLoaded', () => {
  loadOrders();
  
  // Add event listener for date filter Enter key
  const dateInput = document.getElementById("dateFilter");
  if (dateInput) {
    dateInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        filterOrders();
      }
    });
  }
});
</script>
</body>
