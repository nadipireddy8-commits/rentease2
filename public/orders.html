<!DOCTYPE html>
<html>
<head>
  <title>My Orders | RentEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  
  <!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
<style>
    /* ============================================
       RENTEASE ORDERS PAGE - MODERN APP DESIGN
       ============================================ */

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #f5f7fa 0%, #e9ecf3 100%);
        min-height: 100vh;
    }

    /* ========== NAVIGATION ========== */
    .navbar {
        background: white;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .navbar h2 {
        font-size: 1.8rem;
        font-weight: 800;
        background: linear-gradient(135deg, #4158D0, #C850C0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .nav-right {
        display: flex;
        gap: 1rem;
    }

    .nav-btn {
        background: linear-gradient(135deg, #4158D0, #C850C0);
        color: white;
        text-decoration: none;
        padding: 0.6rem 1.2rem;
        border-radius: 30px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s;
    }

    .nav-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(65, 88, 208, 0.3);
    }

    /* ========== PAGE HEADER ========== */
    .page-header {
        max-width: 1200px;
        margin: 2rem auto 1rem;
        padding: 0 2rem;
    }

    .page-header h1 {
        font-size: 2.2rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        color: #1f2937; /* Dark color for visibility */
    }

    .page-header h1 i {
        color: #4158D0;
        font-size: 2rem;
    }

    .page-header p {
        color: #4b5563; /* Darker gray for visibility */
        font-size: 1rem;
        font-weight: 400;
    }

    /* ========== SEARCH SECTION ========== */
    .container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 2rem;
    }

    .search-section {
        background: white;
        border-radius: 24px;
        padding: 1.5rem;
        margin-bottom: 2rem;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }

    .search-title {
        font-size: 1.1rem;
        font-weight: 600;
        color: #1f2937; /* Dark color */
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .search-title i {
        color: #4158D0;
    }

    .search-bar {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
    }

    .date-input-wrapper {
        flex: 2;
        min-width: 250px;
        position: relative;
    }

    .date-input-wrapper i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #6b7280; /* Darker icon */
    }

    .date-input-wrapper input {
        width: 100%;
        padding: 0.8rem 1rem 0.8rem 2.8rem;
        border: 2px solid #e5e7eb;
        border-radius: 16px;
        font-size: 1rem;
        color: #1f2937; /* Dark text */
        transition: all 0.3s;
    }

    .date-input-wrapper input::placeholder {
        color: #9ca3af;
    }

    .date-input-wrapper input:focus {
        outline: none;
        border-color: #4158D0;
        box-shadow: 0 0 0 3px rgba(65, 88, 208, 0.1);
    }

    .btn-group {
        display: flex;
        gap: 0.8rem;
        flex: 1;
    }

    .btn-search, .btn-reset {
        padding: 0.8rem 1.5rem;
        border: none;
        border-radius: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        flex: 1;
        font-size: 0.95rem;
    }

    .btn-search {
        background: linear-gradient(135deg, #4158D0, #C850C0);
        color: white;
    }

    .btn-search:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(65, 88, 208, 0.3);
    }

    .btn-reset {
        background: white;
        color: #4b5563; /* Dark text */
        border: 2px solid #e5e7eb;
    }

    .btn-reset:hover {
        border-color: #4158D0;
        color: #4158D0;
    }

    /* ========== ORDERS GRID ========== */
    .orders-grid {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    /* Order Card */
    .order-card {
        background: white;
        border-radius: 24px;
        padding: 1.5rem;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        transition: all 0.3s;
        border: 1px solid #e5e7eb;
    }

    .order-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 30px -10px rgba(65, 88, 208, 0.15);
        border-color: #4158D0;
    }

    .order-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px dashed #e5e7eb;
        flex-wrap: wrap;
        gap: 1rem;
    }

    .order-info {
        flex: 1;
    }

    .order-id {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #4b5563; /* Darker text */
        font-size: 0.9rem;
        margin-bottom: 0.3rem;
    }

    .order-id i {
        color: #4158D0;
    }

    .order-id span {
        font-family: monospace;
        background: #f3f4f6;
        padding: 0.2rem 0.5rem;
        border-radius: 8px;
        color: #1f2937; /* Dark text */
        font-weight: 500;
    }

    .order-date {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #6b7280; /* Darker gray */
        font-size: 0.9rem;
    }

    .order-date i {
        color: #4158D0;
    }

    .status-badge {
        padding: 0.4rem 1rem;
        border-radius: 30px;
        font-size: 0.8rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.3rem;
    }

    .status-pending {
        background: #fff3cd;
        color: #856404; /* Dark text for visibility */
    }

    .status-paid {
        background: #d4edda;
        color: #155724; /* Dark text for visibility */
    }

    .status-failed {
        background: #f8d7da;
        color: #721c24; /* Dark text for visibility */
    }

    .status-processing {
        background: #cce5ff;
        color: #004085; /* Dark text for visibility */
    }

    .status-delivered {
        background: #d1e7dd;
        color: #0f5132; /* Dark text for visibility */
    }

    .order-items {
        background: #f9fafb;
        border-radius: 16px;
        padding: 1.2rem;
        margin: 1rem 0;
    }

    .items-title {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #1f2937; /* Dark color */
        font-weight: 600;
        margin-bottom: 1rem;
        font-size: 1rem;
    }

    .items-title i {
        color: #4158D0;
    }

    .item-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.8rem 0;
        border-bottom: 1px solid #e5e7eb;
        flex-wrap: wrap;
        gap: 0.5rem;
    }

    .item-row:last-child {
        border-bottom: none;
    }

    .item-name {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #1f2937; /* Dark color */
        font-weight: 500;
        font-size: 1rem;
    }

    .item-name i {
        color: #4158D0;
    }

    .item-details {
        display: flex;
        gap: 1rem;
    }

    .item-details span {
        background: white;
        padding: 0.3rem 1rem;
        border-radius: 20px;
        font-size: 0.9rem;
        border: 1px solid #e5e7eb;
        color: #1f2937; /* Dark text */
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.3rem;
    }

    .item-details span i {
        color: #4158D0;
        font-size: 0.8rem;
    }

    .order-total {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 1rem;
        border-top: 2px solid #4158D0;
        font-size: 1.1rem;
    }

    .total-label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #1f2937; /* Dark color */
        font-weight: 600;
    }

    .total-label i {
        color: #4158D0;
    }

    .total-amount {
        font-size: 1.3rem;
        font-weight: 800;
        background: linear-gradient(135deg, #4158D0, #C850C0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    /* Empty State */
    .empty-state {
        text-align: center;
        padding: 4rem;
        background: white;
        border-radius: 24px;
    }

    .empty-state i {
        font-size: 3rem;
        color: #9ca3af;
        margin-bottom: 1rem;
    }

    .empty-state p {
        color: #4b5563; /* Dark text */
        margin-bottom: 1.5rem;
        font-size: 1.1rem;
    }

    .empty-state-btn {
        display: inline-block;
        padding: 0.8rem 2rem;
        background: linear-gradient(135deg, #4158D0, #C850C0);
        color: white;
        text-decoration: none;
        border-radius: 30px;
        font-weight: 600;
        transition: all 0.3s;
        border: none;
        cursor: pointer;
    }

    .empty-state-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(65, 88, 208, 0.3);
    }

    /* Filter Summary */
    .filter-summary {
        background: linear-gradient(135deg, #4158D0, #C850C0);
        color: white;
        padding: 1rem;
        border-radius: 16px;
        margin-top: 1rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
    }

    .filter-summary i {
        color: white;
    }

    .clear-filter {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        padding: 0.4rem 1rem;
        border-radius: 30px;
        cursor: pointer;
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 0.3rem;
        font-weight: 500;
    }

    .clear-filter:hover {
        background: rgba(255, 255, 255, 0.3);
    }

    .clear-filter i {
        font-size: 0.8rem;
    }

    /* ========== RESPONSIVE ========== */
    @media screen and (max-width: 768px) {
        .navbar {
            padding: 1rem;
        }

        .navbar h2 {
            font-size: 1.5rem;
        }

        .nav-btn span {
            display: none;
        }

        .nav-btn i {
            margin: 0;
            font-size: 1.2rem;
        }

        .page-header {
            padding: 0 1rem;
        }

        .page-header h1 {
            font-size: 1.8rem;
        }

        .container {
            padding: 0 1rem;
        }

        .search-bar {
            flex-direction: column;
        }

        .btn-group {
            width: 100%;
        }

        .btn-search, .btn-reset {
            padding: 0.8rem;
        }

        .order-header {
            flex-direction: column;
        }

        .item-row {
            flex-direction: column;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .item-details {
            width: 100%;
            justify-content: flex-start;
        }

        .order-total {
            flex-direction: column;
            align-items: flex-start;
            gap: 0.5rem;
        }
    }

    @media screen and (max-width: 480px) {
        .order-id span {
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .page-header h1 {
            font-size: 1.5rem;
        }
        
        .search-title {
            font-size: 1rem;
        }
    }

    /* Dark Mode */
    @media (prefers-color-scheme: dark) {
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .navbar, .search-section, .order-card, .empty-state {
            background: #1e1e2f;
            border-color: #2d2d44;
        }

        .navbar h2 {
            background: linear-gradient(135deg, #8b9aff, #b794f4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header h1 {
            color: #f3f4f6;
        }

        .page-header p {
            color: #cbd5e1;
        }

        .search-title {
            color: #f3f4f6;
        }

        .date-input-wrapper input {
            background: #2d2d44;
            border-color: #3d3d5c;
            color: #f3f4f6;
        }

        .date-input-wrapper input::placeholder {
            color: #94a3b8;
        }

        .btn-reset {
            background: #2d2d44;
            color: #f3f4f6;
            border-color: #3d3d5c;
        }

        .order-items {
            background: #2d2d44;
        }

        .order-id {
            color: #cbd5e1;
        }

        .order-id span {
            background: #1e1e2f;
            color: #f3f4f6;
        }

        .order-date {
            color: #94a3b8;
        }

        .item-name {
            color: #f3f4f6;
        }

        .item-details span {
            background: #1e1e2f;
            border-color: #3d3d5c;
            color: #f3f4f6;
        }

        .total-label {
            color: #f3f4f6;
        }

        .empty-state {
            background: #1e1e2f;
        }

        .empty-state p {
            color: #cbd5e1;
        }
    }
</style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h2>RentEase</h2>
    <div class="nav-right">
      <a href="products.html" class="nav-btn">
        <i class="fas fa-store"></i>
        <span>Products</span>
      </a>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>
      <i class="fas fa-shopping-bag"></i>
      My Orders
    </h1>
    <p>Track and manage all your rental orders</p>
  </div>

  <div class="container">

    <!-- Search Section -->
    <div class="search-section">
      <div class="search-title">
        <i class="fas fa-filter"></i>
        Filter Orders
      </div>
      <div class="search-bar">
        <div class="date-input-wrapper">
          <i class="fas fa-calendar"></i>
          <input type="date" id="dateFilter" placeholder="Select date">
        </div>
        <div class="btn-group">
          <button onclick="filterOrders()" class="btn-search">
            <i class="fas fa-search"></i>
            Search
          </button>
          <button onclick="loadOrders()" class="btn-reset">
            <i class="fas fa-redo-alt"></i>
            Reset
          </button>
        </div>
      </div>
    </div>

    <!-- Orders Container -->
    <div id="ordersContainer" class="orders-grid">
      <div class="empty-state">
        <i class="fas fa-box-open"></i>
        <p>Loading your orders...</p>
      </div>
    </div>

  </div>


<script>
// ============================================
// ORDERS PAGE - COMPLETE FUNCTIONALITY
// ============================================

const API_URL = "https://rentease3-backend.onrender.com";
let allOrders = [];

// ============================================
// LOAD ORDERS FROM API
// ============================================
async function loadOrders() {
  const token = localStorage.getItem("token");
  
  // Check if user is logged in
  if (!token) {
    showError("Please login to view your orders", "login");
    return;
  }

  try {
    // Show loading state
    showLoading();

    const res = await fetch(`${API_URL}/api/orders`, {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if (!res.ok) {
      throw new Error(`Failed to fetch orders: ${res.status}`);
    }

    const data = await res.json();
    allOrders = data;
    displayOrders(allOrders);
    
  } catch (error) {
    console.error("Error loading orders:", error);
    showError("Failed to load orders. Please try again.", "retry");
  }
}

// ============================================
// DISPLAY ORDERS
// ============================================
function displayOrders(orders) {
  const container = document.getElementById("ordersContainer");
  
  if (!container) return;

  // Empty state
  if (orders.length === 0) {
    container.innerHTML = getEmptyStateHTML();
    return;
  }

  // Build HTML for all orders
  let ordersHTML = '';
  
  orders.forEach(order => {
    const status = order.paymentStatus || "pending";
    const { statusClass, statusIcon } = getStatusConfig(status);
    
    ordersHTML += `
      <div class="order-card">
        <div class="order-header">
          <div class="order-info">
            <div class="order-id">
              <i class="fas fa-hashtag"></i>
              <span>${order._id}</span>
            </div>
            <div class="order-date">
              <i class="far fa-calendar-alt"></i>
              ${formatDate(order.createdAt)}
            </div>
          </div>
          <div class="status-badge ${statusClass}">
            <i class="fas ${statusIcon}"></i>
            ${status.toUpperCase()}
          </div>
        </div>

        <div class="order-items">
          <div class="items-title">
            <i class="fas fa-box"></i>
            Order Items
          </div>
          ${generateItemsHTML(order.items)}
        </div>

        <div class="order-total">
          <span class="total-label">
            <i class="fas fa-calculator"></i>
            Total Amount
          </span>
          <span class="total-amount">₹${order.totalAmount}</span>
        </div>
      </div>
    `;
  });

  container.innerHTML = ordersHTML;
}

// ============================================
// HELPER FUNCTIONS
// ============================================

// Format date to readable string
function formatDate(dateString) {
  const date = new Date(dateString);
  return date.toLocaleString('en-IN', {
    day: 'numeric',
    month: 'short',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}

// Get status badge configuration
function getStatusConfig(status) {
  const configs = {
    pending: { class: "status-pending", icon: "fa-clock" },
    paid: { class: "status-paid", icon: "fa-check-circle" },
    completed: { class: "status-paid", icon: "fa-check-circle" },
    failed: { class: "status-failed", icon: "fa-times-circle" },
    processing: { class: "status-processing", icon: "fa-spinner fa-spin" },
    delivered: { class: "status-delivered", icon: "fa-truck" }
  };
  
  return configs[status] || configs.pending;
}

// Generate HTML for order items
function generateItemsHTML(items) {
  if (!items || items.length === 0) {
    return '<p class="no-items">No items in this order</p>';
  }

  return items.map(item => `
    <div class="item-row">
      <div class="item-name">
        <i class="fas fa-tag"></i>
        ${item.product?.name || "Product"}
      </div>
      <div class="item-details">
        <span><i class="fas fa-sort-amount-up"></i> Qty: ${item.quantity}</span>
        <span><i class="fas fa-rupee-sign"></i> ₹${item.price}</span>
      </div>
    </div>
  `).join('');
}

// Get empty state HTML
function getEmptyStateHTML() {
  return `
    <div class="empty-state">
      <i class="fas fa-box-open"></i>
      <p>No orders found</p>
      <a href="products.html" class="empty-state-btn">
        <i class="fas fa-store"></i> Browse Products
      </a>
    </div>
  `;
}

// Show loading state
function showLoading() {
  const container = document.getElementById("ordersContainer");
  if (container) {
    container.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Loading your orders...</p>
      </div>
    `;
  }
}

// Show error state
function showError(message, action = "retry") {
  const container = document.getElementById("ordersContainer");
  if (!container) return;

  let actionButton = '';
  
  if (action === "login") {
    actionButton = '<a href="login.html" class="empty-state-btn"><i class="fas fa-sign-in-alt"></i> Go to Login</a>';
  } else {
    actionButton = '<button onclick="loadOrders()" class="empty-state-btn"><i class="fas fa-redo-alt"></i> Try Again</button>';
  }

  container.innerHTML = `
    <div class="empty-state">
      <i class="fas fa-exclamation-circle" style="color: #ef4444;"></i>
      <p>${message}</p>
      ${actionButton}
    </div>
  `;
}

// ============================================
// FILTER ORDERS BY DATE
// ============================================
function filterOrders() {
  const selectedDate = document.getElementById("dateFilter").value;
  
  if (!selectedDate) {
    alert("Please select a date");
    return;
  }

  const filtered = allOrders.filter(order => {
    const orderDate = new Date(order.createdAt)
      .toISOString()
      .split("T")[0];
    return orderDate === selectedDate;
  });

  displayOrders(filtered);
  
  // Remove existing filter summary
  const existingSummary = document.querySelector('.filter-summary');
  if (existingSummary) existingSummary.remove();
  
  // Show filter summary
  const filterSummary = document.createElement('div');
  filterSummary.className = 'filter-summary';
  filterSummary.innerHTML = `
    <i class="fas fa-filter"></i>
    Showing orders from ${formatDate(selectedDate)}
    <button onclick="loadOrders()" class="clear-filter">
      <i class="fas fa-times"></i> Clear
    </button>
  `;
  
  const searchSection = document.querySelector('.search-section');
  if (searchSection) {
    searchSection.appendChild(filterSummary);
  }
}

// ============================================
// RESET FILTERS
// ============================================
function resetFilters() {
  document.getElementById("dateFilter").value = '';
  displayOrders(allOrders);
  
  // Remove filter summary
  const filterSummary = document.querySelector('.filter-summary');
  if (filterSummary) filterSummary.remove();
}

// ============================================
// PAGE INITIALIZATION
// ============================================
document.addEventListener('DOMContentLoaded', () => {
  // Load orders
  loadOrders();
  
  // Add event listener for date filter Enter key
  const dateInput = document.getElementById("dateFilter");
  if (dateInput) {
    dateInput.addEventListener('keypress', (e) => {
