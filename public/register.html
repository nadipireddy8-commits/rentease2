<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="form-box">
    <h2>Register</h2>
    <input type="text" id="regName" placeholder="Name" required autocomplete="off">
    <input type="email" id="regEmail" placeholder="Email" required autocomplete="off">
    <input type="password" id="regPassword" placeholder="Password" required autocomplete="new-password">
    <button onclick="register()">Register</button>
</div>

<script src="script.js"></script>
</body>
</html>
