<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Checkout - RentEase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<style>
    /* ============================================
   CHECKOUT PAGE STYLES - ADD TO style.css
   ============================================ */

.checkout-container {
    max-width: 900px;
    margin: 2rem auto;
    padding: 0 1rem;
}

.checkout-card {
    background: white;
    border-radius: 32px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    overflow: hidden;
    animation: slideUp 0.5s ease;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Header */
.checkout-header {
    background: linear-gradient(135deg, #4158D0, #C850C0);
    padding: 2rem;
    color: white;
    position: relative;
    overflow: hidden;
}

.checkout-header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    animation: rotate 20s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.checkout-header h2 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.checkout-header p {
    font-size: 1rem;
    opacity: 0.9;
    position: relative;
    z-index: 1;
}

/* Progress Bar */
.checkout-progress {
    display: flex;
    padding: 1.5rem 2rem;
    background: #f9fafb;
    border-bottom: 1px solid #e5e7eb;
}

.progress-step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
}

.progress-step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 15px;
    right: -30px;
    width: 60px;
    height: 2px;
    background: #e5e7eb;
}

.progress-step.active .step-number {
    background: linear-gradient(135deg, #4158D0, #C850C0);
    color: white;
}

.progress-step.completed .step-number {
    background: #10b981;
    color: white;
}

.step-number {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #e5e7eb;
    color: #6b7280;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    margin-bottom: 0.5rem;
    transition: all 0.3s;
}

.step-label {
    font-size: 0.8rem;
    color: #6b7280;
    font-weight: 500;
}

.progress-step.active .step-label {
    color: #4158D0;
    font-weight: 600;
}

/* Checkout Content */
.checkout-content {
    padding: 2rem;
}

/* Section Titles */
.section-title {
    font-size: 1.2rem;
    font-weight: 600;
    color: #1f2937;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.section-title i {
    color: #4158D0;
}

/* Product Summary */
.product-summary {
    background: #f9fafb;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    border: 1px solid #e5e7eb;
}

.product-image {
    width: 100px;
    height: 100px;
    border-radius: 12px;
    overflow: hidden;
}

.product-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.product-info {
    flex: 1;
}

.product-info h3 {
    font-size: 1.3rem;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 0.3rem;
}

.product-meta {
    color: #6b7280;
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
}

.product-price {
    color: #4158D0;
    font-weight: 700;
    font-size: 1.2rem;
}

/* Address Form */
.address-form {
    background: white;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    border: 1px solid #e5e7eb;
}

.form-row {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
}

.form-group {
    flex: 1;
    min-width: 200px;
}

.form-group label {
    display: block;
    font-size: 0.9rem;
    font-weight: 500;
    color: #4b5563;
    margin-bottom: 0.3rem;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    font-size: 1rem;
    transition: all 0.3s;
    background: white;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #4158D0;
    box-shadow: 0 0 0 3px rgba(65, 88, 208, 0.1);
}

.form-group input.error,
.form-group select.error,
.form-group textarea.error {
    border-color: #dc2626;
    background: #fef2f2;
}

.error-message {
    color: #dc2626;
    font-size: 0.8rem;
    margin-top: 0.3rem;
    display: none;
}

.error-message.show {
    display: block;
}

/* Delivery Options */
.delivery-options {
    margin-bottom: 2rem;
}

.delivery-option {
    background: white;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    cursor: pointer;
    transition: all 0.3s;
}

.delivery-option:hover {
    border-color: #4158D0;
}

.delivery-option.selected {
    border-color: #4158D0;
    background: #eef2ff;
}

.delivery-option input[type="radio"] {
    width: 20px;
    height: 20px;
    accent-color: #4158D0;
}

.delivery-option .option-details {
    flex: 1;
}

.delivery-option .option-name {
    font-weight: 600;
    color: #1f2937;
    margin-bottom: 0.2rem;
}

.delivery-option .option-desc {
    font-size: 0.9rem;
    color: #6b7280;
}

.delivery-option .option-price {
    font-weight: 700;
    color: #4158D0;
    font-size: 1.1rem;
}

/* Duration Section */
.duration-section {
    background: white;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    border: 1px solid #e5e7eb;
}

.duration-label {
    font-weight: 600;
    color: #4b5563;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.duration-control {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
}

.duration-input-group {
    display: flex;
    align-items: center;
    background: #f3f4f6;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid #e5e7eb;
}

.duration-btn {
    background: white;
    border: none;
    width: 40px;
    height: 40px;
    font-size: 1.2rem;
    font-weight: 600;
    color: #4158D0;
    cursor: pointer;
    transition: all 0.2s;
}

.duration-btn:hover {
    background: #4158D0;
    color: white;
}

.duration-input-group input {
    width: 60px;
    height: 40px;
    border: none;
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    background: transparent;
}

.duration-input-group input:focus {
    outline: none;
}

.duration-hint {
    color: #6b7280;
    font-size: 0.9rem;
}

/* Price Breakdown */
.price-breakdown {
    background: #f9fafb;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 2rem;
}

.price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px dashed #e5e7eb;
}

.price-row:last-child {
    border-bottom: none;
}

.total-row {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 2px solid #4158D0;
    font-weight: 700;
}

.total-label {
    color: #1f2937;
    font-size: 1.1rem;
}

.total-value {
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(135deg, #4158D0, #C850C0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

/* Action Buttons */
.action-buttons {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
}

.btn {
    flex: 1;
    padding: 1rem;
    border-radius: 16px;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
}

.btn-primary {
    background: linear-gradient(135deg, #4158D0, #C850C0);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(65, 88, 208, 0.3);
}

.btn-secondary {
    background: white;
    color: #6b7280;
    border: 2px solid #e5e7eb;
}

.btn-secondary:hover {
    border-color: #4158D0;
    color: #4158D0;
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* Loading State */
.loading-state {
    text-align: center;
    padding: 3rem;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e5e7eb;
    border-top-color: #4158D0;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Empty State */
.empty-state {
    text-align: center;
    padding: 3rem;
}

.empty-state i {
    font-size: 3rem;
    color: #9ca3af;
    margin-bottom: 1rem;
}

.empty-state h3 {
    color: #4b5563;
    margin-bottom: 1rem;
}

/* Order Summary */
.order-summary {
    background: white;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    border: 1px solid #e5e7eb;
}

.summary-row {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem 0;
    border-bottom: 1px solid #e5e7eb;
}

.summary-row:last-child {
    border-bottom: none;
}

.summary-label {
    color: #6b7280;
    font-weight: 500;
}

.summary-value {
    color: #1f2937;
    font-weight: 600;
}

/* Responsive */
@media screen and (max-width: 768px) {
    .checkout-header {
        padding: 1.5rem;
    }

    .checkout-header h2 {
        font-size: 1.5rem;
    }

    .checkout-progress {
        padding: 1rem;
    }

    .progress-step:not(:last-child)::after {
        width: 30px;
        right: -15px;
    }

    .step-label {
        font-size: 0.7rem;
    }

    .checkout-content {
        padding: 1.5rem;
    }

    .product-summary {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .product-image {
        width: 120px;
        height: 120px;
    }

    .form-row {
        flex-direction: column;
        gap: 1rem;
    }

    .duration-control {
        flex-direction: column;
        align-items: flex-start;
    }

    .action-buttons {
        flex-direction: column;
    }

    .delivery-option {
        flex-direction: column;
        text-align: center;
    }
}

@media screen and (max-width: 480px) {
    .checkout-container {
        padding: 0 0.5rem;
    }

    .checkout-header h2 {
        font-size: 1.3rem;
    }

    .step-number {
        width: 25px;
        height: 25px;
        font-size: 0.8rem;
    }

    .step-label {
        font-size: 0.6rem;
    }
}

<body>
    <div class="checkout-container">
        <div class="checkout-card">
            <!-- Header -->
            <div class="checkout-header">
                <h2>
                    <i class="fas fa-truck"></i>
                    Checkout
                </h2>
                <p>Complete your rental booking</p>
            </div>

            <!-- Progress Bar -->
            <div class="checkout-progress">
                <div class="progress-step active" id="step1">
                    <div class="step-number">1</div>
                    <div class="step-label">Address</div>
                </div>
                <div class="progress-step" id="step2">
                    <div class="step-number">2</div>
                    <div class="step-label">Confirm</div>
                </div>
                <div class="progress-step" id="step3">
                    <div class="step-number">3</div>
                    <div class="step-label">Payment</div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="checkout-content" id="checkoutContent">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading checkout details...</p>
                </div>
            </div>
        </div>
    </div>
    <script>
// ============================================
// CHECKOUT PAGE - COMPLETE WITH ADDRESS FORM
// ============================================

const API_URL = "https://rentease3-backend.onrender.com";
let currentStep = 1;
let checkoutItem = null;
let addressData = null;
let deliveryCharge = 49;

document.addEventListener('DOMContentLoaded', function() {
    loadCheckoutItem();
});

// ============================================
// LOAD CHECKOUT ITEM
// ============================================
function loadCheckoutItem() {
    const checkoutContent = document.getElementById('checkoutContent');
    
    if (!checkoutContent) return;

    try {
        const itemJson = localStorage.getItem('checkoutItem');
        
        if (!itemJson) {
            showEmptyState(checkoutContent);
            return;
        }

        checkoutItem = JSON.parse(itemJson);
        
        if (!checkoutItem || !checkoutItem.productName || !checkoutItem.pricePerDay) {
            showError('Invalid checkout item');
            return;
        }

        // Set default days if not set
        if (!checkoutItem.days) checkoutItem.days = 3;
        if (!checkoutItem.totalPrice) {
            checkoutItem.totalPrice = checkoutItem.pricePerDay * checkoutItem.days;
        }

        // Show address form first
        showAddressForm(checkoutContent);

    } catch (error) {
        console.error('Error loading checkout:', error);
        showError('Failed to load checkout details');
    }
}

// ============================================
// SHOW ADDRESS FORM (STEP 1)
// ============================================
function showAddressForm(container) {
    updateProgress(1);
    
    container.innerHTML = `
        <div class="section-title">
            <i class="fas fa-map-marker-alt"></i>
            Delivery Address
        </div>

        <div class="product-summary">
            <div class="product-image">
                <img src="${checkoutItem.productImage || 'https://via.placeholder.com/150'}" 
                     alt="${checkoutItem.productName}"
                     onerror="this.src='https://via.placeholder.com/150'">
            </div>
            <div class="product-info">
                <h3>${checkoutItem.productName}</h3>
                <div class="product-meta">Rental Item</div>
                <div class="product-price">₹${checkoutItem.pricePerDay}/day</div>
            </div>
        </div>

        <form id="addressForm" class="address-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" value="${addressData?.fullName || ''}">
                    <div class="error-message" id="nameError">Please enter your full name</div>
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="phone" placeholder="10-digit mobile number" value="${addressData?.phone || ''}" maxlength="10">
                    <div class="error-message" id="phoneError">Please enter a valid 10-digit phone number</div>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" id="email" placeholder="your@email.com" value="${addressData?.email || ''}">
                <div class="error-message" id="emailError">Please enter a valid email address</div>
            </div>

            <div class="form-group">
                <label>Street Address *</label>
                <input type="text" id="street" placeholder="House no, building, street" value="${addressData?.street || ''}">
                <div class="error-message" id="streetError">Please enter your street address</div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>City *</label>
                    <input type="text" id="city" placeholder="City" value="${addressData?.city || ''}">
                    <div class="error-message" id="cityError">Please enter your city</div>
                </div>
                <div class="form-group">
                    <label>State *</label>
                    <select id="state">
                        <option value="">Select State</option>
                        <option value="Andhra Pradesh" ${addressData?.state === 'Andhra Pradesh' ? 'selected' : ''}>Andhra Pradesh</option>
                        <option value="Delhi" ${addressData?.state === 'Delhi' ? 'selected' : ''}>Delhi</option>
                        <option value="Karnataka" ${addressData?.state === 'Karnataka' ? 'selected' : ''}>Karnataka</option>
                        <option value="Maharashtra" ${addressData?.state === 'Maharashtra' ? 'selected' : ''}>Maharashtra</option>
                        <option value="Tamil Nadu" ${addressData?.state === 'Tamil Nadu' ? 'selected' : ''}>Tamil Nadu</option>
                        <option value="Telangana" ${addressData?.state === 'Telangana' ? 'selected' : ''}>Telangana</option>
                        <option value="Uttar Pradesh" ${addressData?.state === 'Uttar Pradesh' ? 'selected' : ''}>Uttar Pradesh</option>
                        <option value="West Bengal" ${addressData?.state === 'West Bengal' ? 'selected' : ''}>West Bengal</option>
                    </select>
                    <div class="error-message" id="stateError">Please select your state</div>
                </div>
                <div class="form-group">
                    <label>PIN Code *</label>
                    <input type="text" id="pincode" placeholder="6-digit PIN" value="${addressData?.pincode || ''}" maxlength="6">
                    <div class="error-message" id="pincodeError">Please enter a valid 6-digit PIN code</div>
                </div>
            </div>

            <div class="form-group">
                <label>Landmark (Optional)</label>
                <input type="text" id="landmark" placeholder="Nearby landmark" value="${addressData?.landmark || ''}">
            </div>

            <div class="delivery-options">
                <div class="section-title" style="margin-top: 1rem;">
                    <i class="fas fa-truck"></i>
                    Delivery Option
                </div>
                
                <label class="delivery-option ${!addressData?.deliveryType || addressData?.deliveryType === 'standard' ? 'selected' : ''}">
                    <input type="radio" name="delivery" value="standard" ${!addressData?.deliveryType || addressData?.deliveryType === 'standard' ? 'checked' : ''} onchange="selectDelivery('standard')">
                    <div class="option-details">
                        <div class="option-name">Standard Delivery</div>
                        <div class="option-desc">3-5 business days</div>
                    </div>
                    <div class="option-price">₹49</div>
                </label>
                
                <label class="delivery-option ${addressData?.deliveryType === 'express' ? 'selected' : ''}">
                    <input type="radio" name="delivery" value="express" ${addressData?.deliveryType === 'express' ? 'checked' : ''} onchange="selectDelivery('express')">
                    <div class="option-details">
                        <div class="option-name">Express Delivery</div>
                        <div class="option-desc">1-2 business days</div>
                    </div>
                    <div class="option-price">₹99</div>
                </label>
            </div>

            <div class="action-buttons">
                <button type="button" class="btn btn-secondary" onclick="window.location.href='products.html'">
                    <i class="fas fa-times"></i> Cancel
                </button>
                <button type="button" class="btn btn-primary" onclick="validateAndProceed()">
                    <i class="fas fa-arrow-right"></i> Continue to Payment
                </button>
            </div>
        </form>
    `;
}

// ============================================
// SELECT DELIVERY OPTION
// ============================================
function selectDelivery(type) {
    deliveryCharge = type === 'express' ? 99 : 49;
    
    // Update UI
    document.querySelectorAll('.delivery-option').forEach(opt => {
        opt.classList.remove('selected');
    });
    event.target.closest('.delivery-option').classList.add('selected');
}

// ============================================
// VALIDATE AND PROCEED TO PAYMENT
// ============================================
function validateAndProceed() {
    // Get form values
    const fullName = document.getElementById('fullName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const street = document.getElementById('street').value.trim();
    const city = document.getElementById('city').value.trim();
    const state = document.getElementById('state').value;
    const pincode = document.getElementById('pincode').value.trim();
    
    // Get delivery option
    const deliveryType = document.querySelector('input[name="delivery"]:checked')?.value || 'standard';
    deliveryCharge = deliveryType === 'express' ? 99 : 49;

    // Validation
    let isValid = true;

    // Reset error messages
    document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
    document.querySelectorAll('input, select').forEach(el => el.classList.remove('error'));

    // Validate full name
    if (!fullName) {
        showError('fullName', 'nameError');
        isValid = false;
    }

    // Validate phone (10 digits)
    if (!phone || !/^\d{10}$/.test(phone)) {
        showError('phone', 'phoneError');
        isValid = false;
    }

    // Validate email
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('email', 'emailError');
        isValid = false;
    }

    // Validate street
    if (!street) {
        showError('street', 'streetError');
        isValid = false;
    }

    // Validate city
    if (!city) {
        showError('city', 'cityError');
        isValid = false;
    }

    // Validate state
    if (!state) {
        showError('state', 'stateError');
        isValid = false;
    }

    // Validate pincode (6 digits)
    if (!pincode || !/^\d{6}$/.test(pincode)) {
        showError('pincode', 'pincodeError');
        isValid = false;
    }

    if (!isValid) return;

    // Save address data
    addressData = {
        fullName,
        phone,
        email,
        street,
        city,
        state,
        pincode,
        landmark: document.getElementById('landmark').value.trim(),
        deliveryType,
        deliveryCharge
    };

    // Show payment/confirmation step
    showPaymentStep();
}

// ============================================
// SHOW ERROR ON FIELD
// ============================================
function showError(inputId, errorId) {
    document.getElementById(inputId)?.classList.add('error');
    document.getElementById(errorId)?.classList.add('show');
}

// ============================================
// SHOW PAYMENT STEP (STEP 2)

    const container = document.getElementById('checkoutContent');

    const subtotal = checkoutItem.pricePerDay * checkoutItem.days;
    const tax = Math.round(subtotal * 0.18);

    container.innerHTML = `
        <div class="section-title">
            <i class="fas fa-credit-card"></i>
            Confirm & Pay
        </div>

        <div class="order-summary">
            <h3 style="margin-bottom: 1rem;">Order Summary</h3>
            
            <div class="summary-row">
                <span class="summary-label">Product</span>
                <span class="summary-value">${checkoutItem.productName}</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Price per day</span>
                <span class="summary-value">₹${checkoutItem.pricePerDay}</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Duration</span>
                <span class="summary-value">${checkoutItem.days} days</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Subtotal</span>
                <span class="summary-value">₹${subtotal}</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">GST (18%)</span>
                <span class="summary-value">₹${tax}</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Delivery</span>
                <span class="summary-value">₹${addressData?.deliveryCharge || 49}</span>
            </div>
            <div class="summary-row" style="border-bottom: none;">
                <span class="summary-label">Total</span>
                <span class="summary-value" style="font-weight: 700; color: #4158D0;">₹${total}</span>
            </div>
        </div>

        <div class="address-summary" style="margin-bottom: 2rem;">
            <h4 style="margin-bottom: 0.5rem;">Delivery Address</h4>
            <p>${addressData?.fullName}<br>
            ${addressData?.street}<br>
            ${addressData?.city}, ${addressData?.state} - ${addressData?.pincode}<br>
            Phone: ${addressData?.phone}<br>
            Email: ${addressData?.email}</p>
        </div>

        <div class="action-buttons">
            <button type="button" class="btn btn-secondary" onclick="goBackToAddress()">
                <i class="fas fa-arrow-left"></i> Back
            </button>
            <button type="button" class="btn btn-primary" onclick="confirmRental()">
                <i class="fas fa-lock"></i> Pay ₹${total}
            </button>
        </div>
    `;
}

// ============================================
// GO BACK TO ADDRESS FORM
// ============================================
function goBackToAddress() {
    const container = document.getElementById('checkoutContent');
    showAddressForm(container);
}

// ============================================
// CONFIRM RENTAL AND PROCESS PAYMENT
// ============================================
async function confirmRental() {
    const token = localStorage.getItem('token');
    const userId = localStorage.getItem('userId');
    
    if (!token || !userId) {
        alert('Please login first');
        window.location.href = 'login.html';
        return;
    }
    
    // Calculate final total
    const subtotal = checkoutItem.pricePerDay * checkoutItem.days;
    const tax = Math.round(subtotal * 0.18);
    const total = subtotal + tax + (addressData?.deliveryCharge || 49);

    // Add address to rental data
    const rentalData = {
        ...checkoutItem,
        totalPrice: total,
        address: addressData
    };

    try {
        // Disable button
        const confirmBtn = document.querySelector('.btn-primary');
        if (confirmBtn) {
            confirmBtn.disabled = true;
            confirmBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        }

        // Save rental to database
        const rentalResponse = await fetch(`${API_URL}/api/rentals`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(rentalData)
        });

        const rentalResult = await rentalResponse.json();

        if (!rentalResponse.ok) {
            throw new Error(rentalResult.message || 'Failed to create rental');
        }

        // Create payment session
        const paymentResponse = await fetch(`${API_URL}/api/payments/create-checkout-session`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({
                cartItems: [{
                    _id: checkoutItem.productId,
                    name: checkoutItem.productName,
                    price: total,
                    quantity: 1
                }],
                address: addressData
            })
        });

        const paymentData = await paymentResponse.json();

        if (paymentResponse.ok && paymentData.id) {
            // Clear checkout item from localStorage
            localStorage.removeItem('checkoutItem');
            
            // Redirect to Stripe
            const stripe = Stripe("pk_test_51T1VYnEl5zU5gb2fLCMzHZS2PV71rZFiXORD2i89E9v4qPemWAvOhRoxE9U0MZrtWgtesUNOPJ1lmvR1Gh78Nug000Gj0MEM7M");
            await stripe.redirectToCheckout({ sessionId: paymentData.id });
        } else {
            alert('Payment failed: ' + (paymentData.message || 'Unknown error'));
            if (confirmBtn) {
                confirmBtn.disabled = false;
                confirmBtn.innerHTML = '<i class="fas fa-lock"></i> Pay ₹' + total;
            }
        }

    } catch (error) {
        console.error('Checkout error:', error);
        alert('Error processing payment: ' + error.message);
        
        const confirmBtn = document.querySelector('.btn-primary');
        if (confirmBtn) {
            confirmBtn.disabled = false;
            confirmBtn.innerHTML = '<i class="fas fa-lock"></i> Pay ₹' + total;
        }
    }
}

// ============================================
// UPDATE PROGRESS BAR
// ============================================
function updateProgress(step) {
    currentStep = step;
    
    for (let i = 1; i <= 3; i++) {
        const stepEl = document.getElementById(`step${i}`);
        if (!stepEl) continue;
        
        stepEl.classList.remove('active', 'completed');
        
        if (i < step) {
            stepEl.classList.add('completed');
        } else if (i === step) {
            stepEl.classList.add('active');
        }
    }
}

// ============================================
// SHOW EMPTY STATE
// ============================================
function showEmptyState(container) {
    container.innerHTML = `
        <div class="empty-state">
            <i class="fas fa-shopping-cart"></i>
            <h3>No item to checkout</h3>
            <p>Looks like you haven't selected any product to rent yet</p>

                Browse Products
            </button>

}

// ============================================
// SHOW ERROR
// ============================================
function showError(message) {
    const container = document.getElementById('checkoutContent');
    if (!container) return;
    
    container.innerHTML = `
        <div class="empty-state">
            <i class="fas fa-exclamation-circle" style="color: #dc2626;"></i>
            <h3>Something went wrong</h3>
            <p>${message}</p>
            <button onclick="window.location.href='products.html'" class="btn btn-primary">
                Back to Products
            </button>
        </div>
    `;
}

}

        });

}
