<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Checkout - RentEase</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        /* ============================================
           RENTEASE CHECKOUT PAGE - MODERN APP DESIGN
           ============================================ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecf3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Modern Navigation */
        .navbar {
            background: white;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4158D0, #C850C0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: #4b5563;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #4158D0;
        }

        /* Main Container */
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .checkout-wrapper {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }

        /* Checkout Card */
        .checkout-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Card Header */
        .checkout-header {
            background: linear-gradient(135deg, #4158D0, #C850C0);
            padding: 2rem;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .checkout-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .checkout-header h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .checkout-header p {
            font-size: 0.95rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        /* Checkout Content */
        .checkout-content {
            padding: 2rem;
        }

        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e5e7eb;
            border-top-color: #4158D0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-state p {
            color: #6b7280;
            margin-top: 1rem;
        }

        .loading-state small {
            color: #9ca3af;
            font-size: 0.85rem;
            display: block;
            margin-top: 0.5rem;
        }

        /* Error State */
        .error-state {
            text-align: center;
            padding: 3rem;
        }

        .error-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .error-state h3 {
            color: #ef4444;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .error-state p {
            color: #6b7280;
            margin-bottom: 1.5rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4158D0, #C850C0);
            color: white;
            box-shadow: 0 8px 20px rgba(65, 88, 208, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(65, 88, 208, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #6b7280;
            border: 2px solid #e5e7eb;
        }

        .btn-secondary:hover {
            border-color: #4158D0;
            color: #4158D0;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            color: #1f2937;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: #6b7280;
            margin-bottom: 1.5rem;
        }

        /* Product Detail Card */
        .product-detail-card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(65, 88, 208, 0.1);
        }

        .product-row {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .product-image {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1);
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            flex: 1;
        }

        .product-info h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }

        .product-price {
            display: inline-block;
            background: linear-gradient(135deg, #4158D0, #C850C0);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
        }

        /* Days Input */
        .days-section {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #e5e7eb;
        }

        .days-label {
            display: block;
            color: #4b5563;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .days-input-group {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .days-input-wrapper {
            display: flex;
            align-items: center;
            background: #f3f4f6;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e5e7eb;
        }

        .days-btn {
            background: white;
            border: none;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #4158D0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .days-btn:hover {
            background: #4158D0;
            color: white;
        }

        .days-input-wrapper input {
            width: 60px;
            height: 40px;
            border: none;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            background: transparent;
        }

        .days-input-wrapper input:focus {
            outline: none;
        }

        .days-hint {
            color: #6b7280;
            font-size: 0.9rem;
        }

        /* Price Breakdown */
        .price-breakdown {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #e5e7eb;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px dashed #e5e7eb;
        }

        .price-row:last-child {
            border-bottom: none;
        }

        .total-row {
            border-top: 2px solid #4158D0;
            margin-top: 0.5rem;
            padding-top: 1rem;
        }

        .total-label {
            font-weight: 700;
            color: #1f2937;
        }

        .total-value {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4158D0, #C850C0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .action-buttons .btn {
            flex: 1;
            padding: 1rem;
        }

        /* Responsive */
        @media screen and (max-width: 768px) {
            .navbar { padding: 1rem; }
            .nav-links { gap: 1rem; }
            .nav-links a { font-size: 0.9rem; }
            
            .checkout-header { padding: 1.5rem; }
            .checkout-header h2 { font-size: 1.8rem; }
            .checkout-content { padding: 1.5rem; }
            
            .product-row { flex-direction: column; text-align: center; }
            .action-buttons { flex-direction: column; }
        }

        @media screen and (max-width: 480px) {
            .logo { font-size: 1.5rem; }
            .checkout-header h2 { font-size: 1.5rem; }
            .product-info h3 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">RentEase</a>
            <div class="nav-links">
                <a href="products.html">Products</a>
              
                <a href="rentals.html">My Rentals</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        <div class="checkout-wrapper">
            <div class="checkout-card">
                <div class="checkout-header">
                    <h2>Checkout</h2>
                    <p>Complete your rental booking</p>
                </div>
                
                <div class="checkout-content" id="checkoutContent">
                    <!-- Loading state will be shown here -->
                </div>
            </div>
        </div>
    </div>

   <script>
// ============================================
// CHECKOUT PAGE - COMPLETE FIXED VERSION
// ============================================

const API_URL = "https://rentease3-backend.onrender.com";
let loadTimeout;

document.addEventListener('DOMContentLoaded', function() {
    // Clear any existing timeout
    if (loadTimeout) clearTimeout(loadTimeout);
    
    // Set timeout for loading (5 seconds)
    loadTimeout = setTimeout(() => {
        showError('Loading timeout. Please try again.');
    }, 5000);
    
    loadCheckoutItem();
});

// ============================================
// LOAD CHECKOUT ITEM
// ============================================
function loadCheckoutItem() {
    const checkoutContent = document.getElementById('checkoutContent');
    
    if (!checkoutContent) {
        console.error('Checkout container not found');
        return;
    }

    // Clear timeout since we're loading
    if (loadTimeout) clearTimeout(loadTimeout);

    try {
        // Get item from localStorage
        const itemJson = localStorage.getItem('checkoutItem');
        
        if (!itemJson) {
            showEmptyState(checkoutContent);
            return;
        }

        const item = JSON.parse(itemJson);
        
        // Validate item
        if (!item || !item.productName || !item.pricePerDay) {
            showInvalidItemState(checkoutContent);
            return;
        }

        // Display checkout item
        displayCheckoutItem(checkoutContent, item);

    } catch (error) {
        console.error('Error loading checkout:', error);
        showError('Failed to load checkout details');
    }
}

// ============================================
// DISPLAY CHECKOUT ITEM
// ============================================
function displayCheckoutItem(container, item) {
    const subtotal = item.pricePerDay * item.days;
    const tax = Math.round(subtotal * 0.18);
    const total = subtotal + tax;

    container.innerHTML = `
        <!-- Product Detail Card -->
        <div class="product-detail-card">
            <div class="product-row">
                <div class="product-image">
                    <img src="${item.productImage || 'https://via.placeholder.com/150'}" 
                         alt="${item.productName}"
                         onerror="this.src='https://via.placeholder.com/150'">
                </div>
                <div class="product-info">
                    <h3>${item.productName}</h3>
                    <span class="product-price">₹${item.pricePerDay}/day</span>
                </div>
            </div>
        </div>

        <!-- Days Selection -->
        <div class="days-section">
            <label class="days-label">Rental Duration</label>
            <div class="days-input-group">
                <div class="days-input-wrapper">
                    <button class="days-btn" onclick="adjustDays(-1)">−</button>
                    <input type="number" id="days" value="${item.days}" min="1" max="30">
                    <button class="days-btn" onclick="adjustDays(1)">+</button>
                </div>
                <span class="days-hint">days (max 30)</span>
            </div>
        </div>

        <!-- Price Breakdown -->
        <div class="price-breakdown">
            <div class="price-row">
                <span>Price per day</span>
                <span id="pricePerDay">₹${item.pricePerDay}</span>
            </div>
            <div class="price-row">
                <span>Number of days</span>
                <span id="displayDays">${item.days}</span>
            </div>
            <div class="price-row">
                <span>Subtotal</span>
                <span id="subtotal">₹${subtotal}</span>
            </div>
            <div class="price-row">
                <span>GST (18%)</span>
                <span id="tax">₹${tax}</span>
            </div>
            <div class="price-row total-row">
                <span class="total-label">Total Amount</span>
                <span class="total-value" id="totalPrice">₹${total}</span>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button onclick="confirmRental()" class="btn btn-primary" id="confirmBtn">
                <span>✅</span> Confirm & Pay
            </button>
            <button onclick="cancelCheckout()" class="btn btn-secondary">
                <span>✖️</span> Cancel
            </button>
        </div>
    `;

    // Initialize days input after HTML is inserted
    initializeDaysInput();
    
    // Set initial total
    updateTotal();
}

// ============================================
// EMPTY STATE
// ============================================
function showEmptyState(container) {
    container.innerHTML = `
        <div class="empty-state">
            <div class="empty-icon">🛒</div>
            <h3>No item to checkout</h3>
            <p>Looks like you haven't selected any product to rent yet</p>
            <button onclick="window.location.href='products.html'" class="btn btn-primary">
                Browse Products
            </button>
        </div>
    `;
}

// ============================================
// INVALID ITEM STATE
// ============================================
function showInvalidItemState(container) {
    container.innerHTML = `
        <div class="error-state">
            <div class="error-icon">⚠️</div>
            <h3>Invalid checkout item</h3>
            <p>The product information is incomplete</p>
            <button onclick="window.location.href='products.html'" class="btn btn-primary">
                Browse Products
            </button>
        </div>
    `;
}

// ============================================
// ERROR STATE
// ============================================
function showError(message) {
    const container = document.getElementById('checkoutContent');
    if (!container) return;
    
    container.innerHTML = `
        <div class="error-state">
            <div class="error-icon">❌</div>
            <h3>Something went wrong</h3>
            <p>${message || 'Failed to load checkout details'}</p>
            <button onclick="window.location.href='products.html'" class="btn btn-primary">
                Back to Products
            </button>
        </div>
    `;
}

// ============================================
// ADJUST DAYS
// ============================================
function adjustDays(change) {
    const daysInput = document.getElementById('days');
    if (!daysInput) return;
    
    const currentDays = parseInt(daysInput.value) || 1;
    const newDays = Math.max(1, Math.min(30, currentDays + change));
    daysInput.value = newDays;
    updateTotal();
    
    // Visual feedback
    highlightDaysInput();
}

// ============================================
// UPDATE TOTAL FUNCTION
// ============================================
function updateTotal() {
    // Get item from localStorage
    const itemJson = localStorage.getItem('checkoutItem');
    if (!itemJson) {
        console.error('No checkout item found');
        return;
    }

    try {
        const item = JSON.parse(itemJson);
        
        // Get days input value
        const daysInput = document.getElementById('days');
        if (!daysInput) {
            console.error('Days input not found');
            return;
        }

        // Validate and parse days
        let days = parseInt(daysInput.value);
        if (isNaN(days) || days < 1) {
            days = 1;
            daysInput.value = 1;
        }
        if (days > 30) {
            days = 30;
            daysInput.value = 30;
            showDaysLimitWarning();
        }

        // Calculate prices
        const pricePerDay = parseFloat(item.pricePerDay) || 0;
        const subtotal = pricePerDay * days;
        const tax = Math.round(subtotal * 0.18); // 18% GST
        const total = subtotal + tax;

        // Update display elements
        updateDisplayElements(days, subtotal, tax, total);

        // Update localStorage with new values
        item.days = days;
        item.totalPrice = total;
        localStorage.setItem('checkoutItem', JSON.stringify(item));

        console.log('Total updated:', { days, subtotal, tax, total });

    } catch (error) {
        console.error('Error updating total:', error);
    }
}

// ============================================
// UPDATE DISPLAY ELEMENTS
// ============================================
function updateDisplayElements(days, subtotal, tax, total) {
    // Update days display
    const displayDays = document.getElementById('displayDays');
    if (displayDays) {
        displayDays.textContent = days;
    }

    // Update subtotal
    const subtotalElement = document.getElementById('subtotal');
    if (subtotalElement) {
        subtotalElement.textContent = '₹' + subtotal;
    }

    // Update tax
    const taxElement = document.getElementById('tax');
    if (taxElement) {
        taxElement.textContent = '₹' + tax;
    }

    // Update total
    const totalElement = document.getElementById('totalPrice');
    if (totalElement) {
        totalElement.textContent = '₹' + total;
    }
}

// ============================================
// HIGHLIGHT DAYS INPUT (Visual Feedback)
// ============================================
function highlightDaysInput() {
    const daysWrapper = document.querySelector('.days-input-wrapper');
    if (daysWrapper) {
        daysWrapper.style.transition = 'background-color 0.3s';
        daysWrapper.style.backgroundColor = '#e0e7ff';
        
        setTimeout(() => {
            daysWrapper.style.backgroundColor = '';
        }, 200);
    }
}

// ============================================
// SHOW DAYS LIMIT WARNING
// ============================================
function showDaysLimitWarning() {
    // Check if warning already exists
    let warningElement = document.getElementById('daysWarning');
    
    if (!warningElement) {
        const daysSection = document.querySelector('.days-section');
        if (!daysSection) return;
        
        warningElement = document.createElement('div');
        warningElement.id = 'daysWarning';
        warningElement.style.cssText = `
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: #fee2e2;
            border-radius: 8px;
            text-align: center;
        `;
        warningElement.textContent = 'Maximum rental period is 30 days';
        daysSection.appendChild(warningElement);
    }
    
    // Show warning
    warningElement.style.display = 'block';
    
    // Hide after 3 seconds
    setTimeout(() => {
        if (warningElement && warningElement.parentNode) {
            warningElement.style.display = 'none';
        }
    }, 3000);
}

// ============================================
// VALIDATE DAYS INPUT
// ============================================
function validateDaysInput(inputElement) {
    if (!inputElement) return;
    
    let value = parseInt(inputElement.value);
    
    if (isNaN(value) || value < 1) {
        inputElement.value = 1;
    } else if (value > 30) {
        inputElement.value = 30;
        showDaysLimitWarning();
    }
}

// ============================================
// INITIALIZE DAYS INPUT
// ============================================
function initializeDaysInput() {
    const daysInput = document.getElementById('days');
    if (!daysInput) return;
    
    // Remove existing listeners to prevent duplicates
    daysInput.removeEventListener('input', handleDaysInput);
    daysInput.removeEventListener('blur', handleDaysBlur);
    daysInput.removeEventListener('keypress', handleDaysKeyPress);
    
    // Add event listeners
    daysInput.addEventListener('input', handleDaysInput);
    daysInput.addEventListener('blur', handleDaysBlur);
    daysInput.addEventListener('keypress', handleDaysKeyPress);
}

function handleDaysInput() {
    // Validate as user types
    let value = parseInt(this.value);
    if (!isNaN(value)) {
        if (value < 1) this.value = 1;
        if (value > 30) this.value = 30;
    }
}

function handleDaysBlur() {
    validateDaysInput(this);
    updateTotal();
}

function handleDaysKeyPress(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        validateDaysInput(this);
        updateTotal();
        this.blur(); // Remove focus
    }
}

// ============================================
// FORMAT CURRENCY
// ============================================
function formatCurrency(amount) {
    return new Intl.NumberFormat('en-IN', {
        style: 'currency',
        currency: 'INR',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
    }).format(amount).replace('INR', '₹');
}

// ============================================
// CANCEL CHECKOUT
// ============================================
function cancelCheckout() {
    if (confirm('Are you sure you want to cancel?')) {
        localStorage.removeItem('checkoutItem');
        window.location.href = 'products.html';
    }
}

// ============================================
// CONFIRM RENTAL
// ============================================
async function confirmRental() {
    const token = localStorage.getItem('token');
    const userId = localStorage.getItem('userId');
    const item = JSON.parse(localStorage.getItem('checkoutItem'));
    
    if (!token || !userId) {
        alert('Please login first');
        window.location.href = 'login.html';
        return;
    }
    
    if (!item) {
        alert('No item to confirm');
        return;
    }
    
    // Disable confirm button to prevent double click
    const confirmBtn = document.getElementById('confirmBtn');
    if (confirmBtn) {
        confirmBtn.disabled = true;
        confirmBtn.innerHTML = '<span>⏳</span> Processing...';
    }
    
    try {
        console.log("Sending rental data:", item);
        
        const rentalResponse = await fetch(`${API_URL}/api/rentals`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(item)
        });
        
        const rentalData = await rentalResponse.json();
        
        if (rentalResponse.ok) {
            const paymentResponse = await fetch(`${API_URL}/api/payments/create-checkout-session`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    cartItems: [{
                        _id: item.productId,
                        name: item.productName,
                        price: item.pricePerDay,
                        quantity: item.days
                    }]
                })
            });
            
            const paymentData = await paymentResponse.json();
            
            if (paymentResponse.ok && paymentData.id) {
