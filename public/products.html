<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Products - RentEase</title>

<style>
  /* ============================================
   RENTEASE PRODUCTS PAGE - MODERN APP DESIGN
   ============================================ */

/* --------------------------------------------
   1. CSS VARIABLES & THEME
   -------------------------------------------- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
}

body {
  background: #f3f4f6;
  min-height: 100vh;
}

/* --------------------------------------------
   2. NAVIGATION BAR
   -------------------------------------------- */
.navbar {
  background: white;
  box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
  padding: 0.8rem 1.5rem;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  background: rgba(255, 255, 255, 0.95);
}

.nav-container {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 1.8rem;
  font-weight: 800;
  background: linear-gradient(135deg, #4158D0, #C850C0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-decoration: none;
  letter-spacing: -0.5px;
}

.nav-links {
  display: flex;
  gap: 1rem;
  align-items: center;
}

.nav-link {
  color: #4b5563;
  text-decoration: none;
  font-weight: 500;
  padding: 0.5rem 1rem;
  border-radius: 30px;
  transition: all 0.2s;
  font-size: 0.95rem;
}

.nav-link:hover {
  background: #f3f4f6;
  color: #4158D0;
}

.nav-link.active {
  background: linear-gradient(135deg, #4158D0, #C850C0);
  color: white;
}

/* Mobile menu button */
.mobile-menu-btn {
  display: none;
  flex-direction: column;
  justify-content: space-between;
  width: 30px;
  height: 21px;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 0;
  z-index: 1001;
}

.mobile-menu-btn span {
  width: 100%;
  height: 3px;
  background: linear-gradient(135deg, #4158D0, #C850C0);
  border-radius: 3px;
  transition: all 0.3s ease;
}

/* Hamburger to X Animation */
.mobile-menu-btn.active span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}

.mobile-menu-btn.active span:nth-child(2) {
  opacity: 0;
}

.mobile-menu-btn.active span:nth-child(3) {
  transform: rotate(-45deg) translate(7px, -7px);
}

/* --------------------------------------------
   3. PAGE HEADER
   -------------------------------------------- */
.page-header {
  max-width: 1400px;
  margin: 2rem auto 1rem;
  padding: 0 2rem;
}

.page-header h1 {
  font-size: 2.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, #1f2937, #4158D0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.5rem;
}

.page-header p {
  color: #6b7280;
  font-size: 1rem;
}

/* --------------------------------------------
   4. PRODUCTS GRID
   -------------------------------------------- */
.products-grid {
  max-width: 1400px;
  margin: 2rem auto;
  padding: 0 2rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 2rem;
}

/* Product Card */
.product-card {
  background: white;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
  transition: all 0.3s ease;
  border: 1px solid rgba(65, 88, 208, 0.05);
  display: flex;
  flex-direction: column;
}

.product-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 30px -10px rgba(65, 88, 208, 0.15);
  border-color: rgba(65, 88, 208, 0.2);
}

/* Product Image */
.product-image {
  position: relative;
  height: 200px;
  overflow: hidden;
  background: #f9fafb;
}

.product-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.product-card:hover .product-image img {
  transform: scale(1.05);
}

/* Product Badge */
.product-badge {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: linear-gradient(135deg, #4158D0, #C850C0);
  color: white;
  padding: 0.4rem 1rem;
  border-radius: 30px;
  font-size: 0.8rem;
  font-weight: 600;
  box-shadow: 0 4px 10px rgba(65, 88, 208, 0.3);
  z-index: 1;
}

/* Product Details */
.product-details {
  padding: 1.5rem;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.product-category {
  color: #4158D0;
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 0.3rem;
}

.product-name {
  font-size: 1.25rem;
  font-weight: 700;
  color: #1f2937;
  margin-bottom: 0.5rem;
  line-height: 1.3;
}

.product-description {
  color: #6b7280;
  font-size: 0.9rem;
  margin-bottom: 1rem;
  line-height: 1.5;
}

/* Price Section */
.product-price-section {
  margin: 1rem 0;
  padding: 1rem 0;
  border-top: 1px dashed #e5e7eb;
  border-bottom: 1px dashed #e5e7eb;
}

.price-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.5rem;
}

.price-label {
  color: #6b7280;
  font-size: 0.9rem;
}

.price-value {
  font-weight: 700;
  font-size: 1.1rem;
}

.rent-price {
  color: #4158D0;
}

.deposit-price {
  color: #C850C0;
}

/* Rent Button */
.rent-btn {
  background: linear-gradient(135deg, #4158D0, #C850C0);
  color: white;
  border: none;
  padding: 1rem;
  border-radius: 16px;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: auto;
  box-shadow: 0 4px 10px rgba(65, 88, 208, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.rent-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(65, 88, 208, 0.3);
}

.rent-btn:active {
  transform: translateY(0);
}

/* Loading State */
.loading-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 4rem;
}

.loading-spinner {
  width: 50px;
  height: 50px;
  border: 4px solid #e5e7eb;
  border-top-color: #4158D0;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Empty State */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 4rem;
  background: white;
  border-radius: 30px;
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
}

.empty-state h3 {
  color: #6b7280;
  font-size: 1.2rem;
  font-weight: 500;
}

.retry-btn {
  background: linear-gradient(135deg, #4158D0, #C850C0);
  color: white;
  border: none;
  padding: 0.8rem 2rem;
  border-radius: 30px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 1rem;
}

/* --------------------------------------------
   5. MOBILE MENU STYLES
   -------------------------------------------- */
@media screen and (max-width: 768px) {
  .navbar {
    padding: 0.8rem 1rem;
  }

  .nav-links {
    display: none;
    position: absolute;
    top: 70px;
    left: 0;
    right: 0;
    background: white;
    flex-direction: column;
    padding: 1.5rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    z-index: 1000;
    border-bottom: 1px solid #e5e7eb;
  }

  .nav-links.active {
    display: flex;
  }

  .nav-link {
    display: block;
    padding: 1rem;
    text-align: center;
    font-size: 1rem;
    border-bottom: 1px solid #f3f4f6;
    width: 100%;
  }

  .nav-link:last-child {
    border-bottom: none;
  }

  .mobile-menu-btn {
    display: flex;
  }

  .page-header {
    padding: 0 1rem;
    margin: 1.5rem auto 0.5rem;
  }

  .page-header h1 {
    font-size: 1.8rem;
  }

  .products-grid {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
    padding: 0 1rem;
  }

  .product-image {
    height: 150px;
  }

  .product-details {
    padding: 1rem;
  }

  .product-name {
    font-size: 1rem;
  }

  .product-category {
    font-size: 0.7rem;
  }

  .product-description {
    font-size: 0.8rem;
    margin-bottom: 0.5rem;
  }

  .product-price-section {
    margin: 0.5rem 0;
    padding: 0.5rem 0;
  }

  .price-row {
    font-size: 0.85rem;
  }

  .rent-btn {
    padding: 0.8rem;
    font-size: 0.9rem;
    border-radius: 12px;
  }

  .product-badge {
    top: 0.5rem;
    right: 0.5rem;
    padding: 0.3rem 0.8rem;
    font-size: 0.7rem;
  }
}

/* Small Mobile */
@media screen and (max-width: 480px) {
  .products-grid {
    grid-template-columns: 1fr;
    gap: 1rem;
  }

  .product-image {
    height: 180px;
  }

  .product-details {
    padding: 1.2rem;
  }

  .product-name {
    font-size: 1.1rem;
  }
}

/* Landscape Mode */
@media screen and (orientation: landscape) and (max-height: 600px) {
  .products-grid {
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  }
}

/* --------------------------------------------
   6. ANIMATIONS
   -------------------------------------------- */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.product-card {
  animation: fadeIn 0.5s ease forwards;
}

.product-card:nth-child(1) { animation-delay: 0.1s; }
.product-card:nth-child(2) { animation-delay: 0.2s; }
.product-card:nth-child(3) { animation-delay: 0.3s; }
.product-card:nth-child(4) { animation-delay: 0.4s; }
.product-card:nth-child(5) { animation-delay: 0.5s; }
.product-card:nth-child(6) { animation-delay: 0.6s; }
.search-container {
    max-width: 1400px;
    margin: 1rem auto;
    padding: 0 2rem;
}

.search-box {
    position: relative;
    max-width: 500px;
    margin: 0 auto;
}

.search-box i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #9ca3af;
}

.search-box input {
    width: 100%;
    padding: 12px 40px 12px 45px;
    border: 2px solid #e5e7eb;
    border-radius: 50px;
    font-size: 1rem;
    transition: all 0.3s;
}

.search-box input:focus {
    outline: none;
    border-color: #4158D0;
    box-shadow: 0 0 0 3px rgba(65, 88, 208, 0.1);
}

.clear-search {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #9ca3af;
    display: none;
}

.clear-search.show {
    display: block;
}

.search-count {
    text-align: center;
    margin-top: 0.5rem;
    font-size: 0.9rem;
    color: #6b7280;
}
</style>
  
</head>
<body>

  <!-- Modern Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">RentEase</a>
      
      <div class="nav-links">
        <a href="rentals.html" class="nav-link">My Rentals</a>
        <a href="orders.html" class="nav-link">Orders</a>
        <a href="login.html" class="nav-link">Login</a>
        <a href="register.html" class="nav-link">Register</a>
      </div>

      <!-- Mobile Menu Button -->
      <button class="mobile-menu-btn" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <h1>Available Products</h1>
    <p>Choose from our wide range of furniture and appliances</p>
  </div>
  <!-- Search Bar -->
<div class="search-container">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search products by name, category..." onkeyup="filterProducts()">
        <button onclick="clearSearch()" class="clear-search">
            <i class="fas fa-times"></i>
        </button>
    </div>
    <div id="searchResultsCount" class="search-count"></div>
</div>

  <!-- Products Grid -->
  <div class="products-grid" id="products"></div>

  <script>
    // ============================================
    // RENTEASE PRODUCTS PAGE - COMPLETE SCRIPT
    // ============================================

    // Live backend URL
    const API_URL = "https://rentease3-backend.onrender.com";
    let allProducts = []; // Store all products for search

    // ============================================
    // LOAD PRODUCTS FUNCTION
    // ============================================
    async function loadProducts() {
        try {
            const container = document.getElementById("products");
            if (!container) return;
            
            container.innerHTML = `
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Loading amazing products...</p>
                </div>
            `;

            const response = await fetch(`${API_URL}/api/products`);
            const products = await response.json();

            allProducts = products; // Store for search

            console.log("Products loaded:", products.length);

            container.innerHTML = "";

            if (!products || products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <h3>No products available</h3>
                    </div>
                `;
                return;
            }

            displayProducts(products);

        } catch (error) {
            console.error("Error loading products:", error);
            const container = document.getElementById("products");
            if (container) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>Failed to load products. Please try again.</h3>
                        <button onclick="loadProducts()" class="retry-btn">Try Again</button>
                    </div>
                `;
            }
        }
    }

    // ============================================
    // DISPLAY PRODUCTS FUNCTION
    // ============================================
    function displayProducts(products) {
        const container = document.getElementById("products");
        container.innerHTML = "";

        products.forEach(product => {
            const productCard = document.createElement('div');
            productCard.className = 'product-card';

            const description = `Perfect for your home or office. High quality and affordable.`;

            productCard.innerHTML = `
                <div class="product-image">
                    <img src="${product.image || 'https://via.placeholder.com/300x200?text=Product'}" 
                         alt="${product.name}"
                         onerror="this.src='https://via.placeholder.com/300x200?text=Product'">
                    <div class="product-badge">Available</div>
                </div>
                <div class="product-details">
                    <div class="product-category">${product.category || 'General'}</div>
                    <h3 class="product-name">${product.name}</h3>
                    <p class="product-description">${description}</p>
                    
                    <div class="product-price-section">
                        <div class="price-row">
                            <span class="price-label">Rent per day</span>
                            <span class="price-value rent-price">₹${product.rent}</span>
                        </div>
                        <div class="price-row">
                            <span class="price-label">Security deposit</span>
                            <span class="price-value deposit-price">₹${product.deposit || 0}</span>
                        </div>
                    </div>
                    
                    <button class="rent-btn" onclick="rentNow('${product._id}')">
                        <span>📦</span> Rent Now
                    </button>
                </div>
            `;

            container.appendChild(productCard);
        });
    }

    // ============================================
    // SEARCH FUNCTIONS
    // ============================================
    function filterProducts() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        const clearBtn = document.querySelector('.clear-search');
        
        if (searchTerm === '') {
            if (clearBtn) clearBtn.classList.remove('show');
            displayProducts(allProducts);
            document.getElementById('searchResultsCount').innerHTML = '';
            return;
        }
        
        if (clearBtn) clearBtn.classList.add('show');
        
        const filtered = allProducts.filter(product => 
            product.name.toLowerCase().includes(searchTerm) ||
            (product.category && product.category.toLowerCase().includes(searchTerm))
        );
        
        displayProducts(filtered);
        
        const count = filtered.length;
        document.getElementById('searchResultsCount').innerHTML = `Found ${count} product${count !== 1 ? 's' : ''}`;
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        filterProducts();
    }

    // ============================================
    // RENT NOW FUNCTION
    // ============================================
    function rentNow(productId) {
        const token = localStorage.getItem("token");
        const userId = localStorage.getItem("userId");

        if (!token || !userId) {
            alert("Please login first");
            window.location.href = "login.html";
            return;
        }

        fetch(`${API_URL}/api/products`)
            .then(res => res.json())
            .then(products => {
                const product = products.find(p => p._id === productId);

                if (product) {
                    const days = prompt("Enter number of days to rent:", "3");

                    if (days && !isNaN(days) && days > 0) {
                        const totalPrice = product.rent * parseInt(days);

                        const rental = {
                            productId: product._id,
                            productName: product.name,
                            productImage: product.image,
                            pricePerDay: product.rent,
                            days: parseInt(days),
                            totalPrice: totalPrice,
                            userId: userId
                        };

                        localStorage.setItem("checkoutItem", JSON.stringify(rental));
                        window.location.href = "checkout.html";
                    }
                }
            })
            .catch(err => {
                console.error("Error fetching product:", err);
                alert("Error processing request");
            });
    }

    // ============================================
    // MOBILE MENU FUNCTIONALITY
    // ============================================
    function toggleMobileMenu() {
        const menuBtn = document.querySelector('.mobile-menu-btn');
        const navLinks = document.querySelector('.nav-links');
        
        if (!menuBtn || !navLinks) return;

        menuBtn.classList.toggle('active');
        navLinks.classList.toggle('active');

        const spans = menuBtn.querySelectorAll('span');
        if (menuBtn.classList.contains('active')) {
            spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
            spans[1].style.opacity = '0';
            spans[2].style.transform = 'rotate(-45deg) translate(7px, -7px)';
            document.body.style.overflow = 'hidden';
        } else {
            spans[0].style.transform = 'none';
            spans[1].style.opacity = '1';
            spans[2].style.transform = 'none';
            document.body.style.overflow = '';
        }
    }

    // ============================================
    // INITIALIZE MOBILE MENU
    // ============================================
    function initMobileMenu() {
        const menuBtn = document.querySelector('.mobile-menu-btn');
        const navLinks = document.querySelectorAll('.nav-link');
        
        if (!menuBtn) return;

        menuBtn.addEventListener('click', toggleMobileMenu);

        navLinks.forEach(link => {
            link.addEventListener('click', function() {
                const navLinksContainer = document.querySelector('.nav-links');
                if (navLinksContainer?.classList.contains('active')) {
                    menuBtn.classList.remove('active');
                    navLinksContainer.classList.remove('active');
                    
                    const spans = menuBtn.querySelectorAll('span');
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                    
                    document.body.style.overflow = '';
                }
            });
        });

        document.addEventListener('click', function(e) {
            const navLinksContainer = document.querySelector('.nav-links');
            
            if (!navLinksContainer?.classList.contains('active')) return;
            
            if (!e.target.closest('.nav-links') && !e.target.closest('.mobile-menu-btn')) {
                menuBtn.classList.remove('active');
                navLinksContainer.classList.remove('active');
                
                const spans = menuBtn.querySelectorAll('span');
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
                
                document.body.style.overflow = '';
            }
        });

        window.addEventListener('resize', function() {
            const navLinksContainer = document.querySelector('.nav-links');
            
            if (window.innerWidth > 768 && navLinksContainer?.classList.contains('active')) {
                menuBtn.classList.remove('active');
                navLinksContainer.classList.remove('active');
                
                const spans = menuBtn.querySelectorAll('span');
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
                
                document.body.style.overflow = '';
            }
        });
    }

    // ============================================
    // PAGE INITIALIZATION
    // ============================================
    document.addEventListener('DOMContentLoaded', function() {
        loadProducts();
        initMobileMenu();
        console.log('✅ Products page initialized');
    });
</script>
</body>
</html>
