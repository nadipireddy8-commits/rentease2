<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Payment Success</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .card {
    background: #ffffff;
    width: 100%;
    max-width: 420px;
    padding: 30px 25px;
    border-radius: 14px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  }

  .icon {
    font-size: 60px;
    margin-bottom: 15px;
  }

  h1 {
    color: #16a34a;
    font-size: 24px;
    margin-bottom: 10px;
  }

  p {
    color: #555;
    margin-bottom: 25px;
    font-size: 15px;
  }

  .btn {
    display: inline-block;
    background: #2563eb;
    color: white;
    text-decoration: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    transition: 0.3s;
  }

  .btn:hover {
    background: #1d4ed8;
  }

  @media (max-width: 480px) {
    .card {
      padding: 25px 18px;
    }

    h1 {
      font-size: 20px;
    }
  }
</style>
</head>

<body>

<div class="card">
  <div class="icon">✅</div>
  <h1>Payment Successful</h1>
  <p>Your order has been placed successfully.</p>
  <a href="orders.html" class="btn">View My Orders</a>
</div>

<script>
async function markOrderPaid() {
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get("orderId");
  const token = localStorage.getItem("token");

  if (!orderId || !token) return;

  try {
    await fetch(`https://rentease2-backend.onrender.com/api/payment/confirm-payment/${orderId}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      }
    });
  } catch (err) {
    console.error("Error marking order paid:", err);
  }
}

markOrderPaid();
</script>

</body>
</html>
