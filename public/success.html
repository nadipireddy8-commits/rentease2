<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Payment Success - RentEase</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .card {
    background: #ffffff;
    width: 100%;
    max-width: 420px;
    padding: 40px 30px;
    border-radius: 24px;
    text-align: center;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    animation: slideUp 0.5s ease;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .icon {
    width: 80px;
    height: 80px;
    background: #10b981;
    color: white;
    font-size: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }

  h1 {
    color: #1f2937;
    font-size: 28px;
    margin-bottom: 10px;
  }

  p {
    color: #6b7280;
    margin-bottom: 30px;
    font-size: 16px;
  }

  .btn-group {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-block;
    background: linear-gradient(135deg, #4158D0, #C850C0);
    color: white;
    text-decoration: none;
    padding: 12px 24px;
    border-radius: 30px;
    font-weight: 600;
    transition: all 0.3s;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(65, 88, 208, 0.3);
  }

  .btn-outline {
    background: white;
    color: #4158D0;
    border: 2px solid #4158D0;
  }

  .btn-outline:hover {
    background: #4158D0;
    color: white;
  }

  .loading {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid white;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @media (max-width: 480px) {
    .card {
      padding: 30px 20px;
    }
    h1 {
      font-size: 24px;
    }
    .btn-group {
      flex-direction: column;
    }
  }
</style>
</head>
<body>

<div class="card">
  <div class="icon">✓</div>
  <h1>Payment Successful!</h1>
  <p>Your rental order has been confirmed.<br>You can track it in My Rentals.</p>
  <div class="btn-group">
    <a href="rentals.html" class="btn">View My Rentals</a>
    <a href="products.html" class="btn btn-outline">Continue Shopping</a>
  </div>
</div>

<script>
const API_URL = "https://rentease3-backend.onrender.com";

async function confirmPayment() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get("session_id");
  const token = localStorage.getItem("token");

  if (!sessionId || !token) {
    console.log("No session ID found, skipping confirmation");
    return;
  }

  try {
    console.log("Confirming payment for session:", sessionId);
    
    const response = await fetch(`${API_URL}/api/payments/confirm-payment`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ sessionId })
    });

    const data = await response.json();
    console.log("Confirmation response:", data);
    
    if (data.success) {
      console.log("✅ Payment confirmed successfully!");
    } else {
      console.log("⚠️ Payment confirmation pending:", data.message);
    }
  } catch (err) {
    console.error("Error confirming payment:", err);
  }
}

confirmPayment();
</script>

</body>
</html>
