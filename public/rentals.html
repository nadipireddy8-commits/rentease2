<!DOCTYPE html>
<html>
<head>
  <title>My Rentals - RentEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
</head>
<style>
  /* ============================================
   RENTALS PAGE - CLEAN DESIGN, NO SPINNER ISSUES
   ============================================ */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

body {
  background: linear-gradient(135deg, #f5f7fa 0%, #e9ecf3 100%);
  min-height: 100vh;
  padding: 20px;
}

/* Main Container */
.rentals-container {
  max-width: 900px;
  margin: 0 auto;
}

/* Header */
.rentals-header {
  background: linear-gradient(135deg, #4158D0, #C850C0);
  border-radius: 24px 24px 0 0;
  padding: 1.5rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
}

.header-title {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.header-title i {
  font-size: 1.8rem;
  color: white;
}

.header-title h1 {
  font-size: 1.5rem;
  font-weight: 700;
  color: white;
  margin: 0;
}

/* Orders Link */
.orders-link {
  background: rgba(255, 255, 255, 0.2);
  color: white;
  padding: 0.6rem 1.2rem;
  border-radius: 40px;
  font-size: 0.9rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  border: 1px solid rgba(255,255,255,0.3);
}

.orders-link:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: translateY(-2px);
}

/* Rentals List */
.rentals-list {
  background: white;
  border-radius: 0 0 24px 24px;
  padding: 2rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  min-height: 400px;
}

/* Loading Placeholder */
.loading-placeholder {
  text-align: center;
  padding: 3rem;
}

.loader {
  width: 40px;
  height: 40px;
  border: 3px solid #e5e7eb;
  border-top-color: #4158D0;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Rental Card */
.rental-card {
  background: #f9fafb;
  border-radius: 20px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  border: 1px solid #e5e7eb;
  transition: all 0.3s ease;
  position: relative;
}

.rental-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(65, 88, 208, 0.1);
  border-color: #4158D0;
}

/* Card Left Border Accent */
.rental-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 5px;
  height: 100%;
  background: linear-gradient(180deg, #4158D0, #C850C0);
  border-radius: 3px 0 0 3px;
}

/* Rental Info */
.rental-title {
  font-size: 1.3rem;
  font-weight: 700;
  color: #1f2937;
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.rental-title i {
  color: #4158D0;
  font-size: 1.2rem;
}

.rental-id {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  color: #6b7280;
  font-size: 0.8rem;
  background: #f3f4f6;
  padding: 0.3rem 1rem;
  border-radius: 30px;
  margin-bottom: 1rem;
}

.rental-id i {
  color: #4158D0;
  font-size: 0.75rem;
}

/* Rental Details Grid */
.rental-details {
  display: flex;
  flex-wrap: wrap;
  gap: 2rem;
  margin: 1rem 0 1.5rem;
}

.detail-item {
  flex: 1;
  min-width: 120px;
}

.detail-label {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: #6b7280;
  font-size: 0.85rem;
  margin-bottom: 0.3rem;
}

.detail-label i {
  color: #4158D0;
  width: 18px;
}

.detail-value {
  font-size: 1.2rem;
  font-weight: 700;
  color: #1f2937;
  margin-left: 1.8rem;
}

.detail-value small {
  font-size: 0.85rem;
  font-weight: 400;
  color: #6b7280;
}

.price-highlight {
  background: linear-gradient(135deg, #4158D0, #C850C0);
  color: white;
  padding: 0.2rem 1rem;
  border-radius: 30px;
  display: inline-block;
  font-size: 1rem;
}

/* Button Group */
.button-group {
  display: flex;
  gap: 0.8rem;
  flex-wrap: wrap;
  margin-top: 0.5rem;
}

/* Button Styles - NO SPINNER ISSUES */
.btn {
  padding: 0.6rem 1.2rem;
  border-radius: 30px;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  border: none;
  background: white;
}

.btn:active {
  transform: scale(0.98);
}

.btn-disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.btn-cancel {
  background: white;
  color: #dc2626;
  border: 2px solid #dc2626;
}

.btn-cancel:hover {
  background: #dc2626;
  color: white;
}

.btn-maintenance {
  background: white;
  color: #f59e0b;
  border: 2px solid #f59e0b;
}

.btn-maintenance:hover {
  background: #f59e0b;
  color: white;
}

.btn-return {
  background: white;
  color: #10b981;
  border: 2px solid #10b981;
}

.btn-return:hover {
  background: #10b981;
  color: white;
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 3rem;
}

.empty-state i {
  font-size: 4rem;
  color: #9ca3af;
  margin-bottom: 1rem;
}

.empty-state p {
  color: #4b5563;
  margin-bottom: 1.5rem;
}

.empty-state a {
  display: inline-block;
  padding: 0.8rem 2rem;
  background: linear-gradient(135deg, #4158D0, #C850C0);
  color: white;
  text-decoration: none;
  border-radius: 40px;
  font-weight: 600;
}

/* Login Prompt */
.login-prompt {
  text-align: center;
  padding: 3rem;
}

.login-prompt i {
  font-size: 4rem;
  color: #9ca3af;
  margin-bottom: 1rem;
}

.login-prompt a {
  display: inline-block;
  padding: 0.8rem 2rem;
  background: linear-gradient(135deg, #4158D0, #C850C0);
  color: white;
  text-decoration: none;
  border-radius: 40px;
  font-weight: 600;
  margin-top: 1rem;
}

/* Error State */
.error-state {
  text-align: center;
  padding: 3rem;
}

.error-state i {
  font-size: 4rem;
  color: #dc2626;
  margin-bottom: 1rem;
}

.error-state button {
  background: linear-gradient(135deg, #4158D0, #C850C0);
  color: white;
  border: none;
  padding: 0.8rem 2rem;
  border-radius: 40px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 1rem;
}

/* ========== RESPONSIVE ========== */

/* Tablet */
@media screen and (max-width: 768px) {
  body {
    padding: 15px;
  }
  
  .rentals-header {
    padding: 1.2rem 1.5rem;
  }
  
  .rentals-list {
    padding: 1.5rem;
  }
  
  .rental-title {
    font-size: 1.2rem;
  }
}

/* Mobile */
@media screen and (max-width: 480px) {
  body {
    padding: 10px;
  }
  
  .rentals-header {
    flex-direction: column;
    align-items: flex-start;
    padding: 1rem 1.2rem;
    border-radius: 20px 20px 0 0;
  }
  
  .orders-link {
    width: 100%;
    justify-content: center;
  }
  
  .rentals-list {
    padding: 1rem;
    border-radius: 0 0 20px 20px;
  }
  
  .rental-card {
    padding: 1rem;
  }
  
  .rental-title {
    font-size: 1.1rem;
  }
  
  .rental-details {
    flex-direction: column;
    gap: 0.8rem;
  }
  
  .detail-value {
    font-size: 1rem;
    margin-left: 1.5rem;
  }
  
  .button-group {
    flex-direction: column;
  }
  
  .btn {
    width: 100%;
    justify-content: center;
  }
}

/* Dark Mode */
@media (prefers-color-scheme: dark) {
  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  }
  
  .rentals-list {
    background: #1e1e2f;
  }
  
  .rental-card {
    background: #2d2d44;
    border-color: #3d3d5c;
  }
  
  .rental-title {
    color: #f3f4f6;
  }
  
  .rental-id {
    background: #1e1e2f;
    color: #9ca3af;
  }
  
  .detail-label {
    color: #9ca3af;
  }
  
  .detail-value {
    color: #f3f4f6;
  }
  
  .btn-cancel {
    background: #2d2d44;
    border-color: #dc2626;
  }
  
  .btn-maintenance {
    background: #2d2d44;
    border-color: #f59e0b;
  }
  
  .btn-return {
    background: #2d2d44;
    border-color: #10b981;
  }
}
</style>
<body>
  <div class="rentals-container">
    <!-- Header -->
    <div class="rentals-header">
      <div class="header-title">
        <i class="fas fa-box-open"></i>
        <h1>My Active Rentals</h1>
      </div>
      <a href="orders.html" class="orders-link">
        <i class="fas fa-shopping-bag"></i> Orders
      </a>
    </div>

    <!-- Rentals List -->
    <div id="rentalsList" class="rentals-list">
      <div class="loading-placeholder">
        <div class="loader"></div>
        <p>Loading your rentals...</p>
      </div>
    </div>
  </div>

  <script >
    // ============================================
// RENTALS PAGE - COMPLETE FUNCTIONALITY
// ============================================

const API_URL = "https://rentease3-backend.onrender.com";

// Load rentals when page loads
document.addEventListener('DOMContentLoaded', function() {
    loadRentals();
});

// ============================================
// LOAD RENTALS FUNCTION
// ============================================
async function loadRentals() {
    const container = document.getElementById('rentalsList');
    if (!container) return;

    const userId = localStorage.getItem('userId');
    const token = localStorage.getItem('token');

    // Check login
    if (!userId || !token) {
        container.innerHTML = `
            <div class="login-prompt">
                <i class="fas fa-sign-in-alt"></i>
                <p>Please log in to view your rentals</p>
                <a href="login.html">Go to Login</a>
            </div>
        `;
        return;
    }

    try {
        const response = await fetch(`${API_URL}/api/rentals?userId=${userId}`, {
            headers: { 'Authorization': 'Bearer ' + token }
        });

        if (!response.ok) throw new Error('Failed to fetch');

        const rentals = await response.json();
        container.innerHTML = '';

        if (!rentals || rentals.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <p>No active rentals found</p>
                    <a href="products.html">Browse Products</a>
                </div>
            `;
            return;
        }

        // Display each rental
        rentals.forEach(rental => {
            const card = document.createElement('div');
            card.className = 'rental-card';
            card.innerHTML = `
                <div>
                    <h3 class="rental-title">
                        <i class="fas fa-tag"></i>
                        ${rental.productName || 'Product'}
                    </h3>
                    <div class="rental-id">
                        <i class="fas fa-hashtag"></i>
                        <span>${rental._id.slice(-8)}</span>
                    </div>
                </div>

                <div class="rental-details">
                    <div class="detail-item">
                        <div class="detail-label">
                            <i class="far fa-calendar-alt"></i>
                            Rental Period
                        </div>
                        <div class="detail-value">
                            ${rental.days || 0} <small>days</small>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">
                            <i class="fas fa-rupee-sign"></i>
                            Total Price
                        </div>
                        <div class="detail-value price-highlight">
                            ₹${rental.totalPrice || 0}
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn btn-cancel" data-id="${rental._id}" data-name="${rental.productName}">
                        <i class="fas fa-times-circle"></i> Cancel Rental
                    </button>
                    <button class="btn btn-maintenance" data-id="${rental._id}" data-name="${rental.productName}">
                        <i class="fas fa-tools"></i> Report Issue
                    </button>
                    <button class="btn btn-return" data-id="${rental._id}" data-name="${rental.productName}">
                        <i class="fas fa-calendar-alt"></i> Schedule Return
                    </button>
                </div>
            `;
            container.appendChild(card);
        });

        // Add event listeners to buttons
        attachButtonEvents();

    } catch (error) {
        console.error('Error:', error);
        container.innerHTML = `
            <div class="error-state">
                <i class="fas fa-exclamation-circle"></i>
                <p>Failed to load rentals. Please try again.</p>
                <button onclick="loadRentals()">Try Again</button>
            </div>
        `;
    }
}

// ============================================
// ATTACH BUTTON EVENT LISTENERS
// ============================================
function attachButtonEvents() {
    // Cancel buttons
    document.querySelectorAll('.btn-cancel').forEach(btn => {
        btn.removeEventListener('click', handleCancel);
        btn.addEventListener('click', handleCancel);
    });

    // Maintenance buttons
    document.querySelectorAll('.btn-maintenance').forEach(btn => {
        btn.removeEventListener('click', handleMaintenance);
        btn.addEventListener('click', handleMaintenance);
    });

    // Return buttons
    document.querySelectorAll('.btn-return').forEach(btn => {
        btn.removeEventListener('click', handleReturn);
        btn.addEventListener('click', handleReturn);
    });
}

// ============================================
// HANDLE CANCEL RENTAL
// ============================================
async function handleCancel(e) {
    const btn = e.currentTarget;
    const rentalId = btn.dataset.id;
    
    if (!confirm('Are you sure you want to cancel this rental?')) return;

    const token = localStorage.getItem('token');
    if (!token) {
        alert('Please login first');
        window.location.href = 'login.html';
        return;
    }

    // Disable button
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processing...';
    btn.style.opacity = '0.7';

    try {
        const response = await fetch(`${API_URL}/api/rentals/${rentalId}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });

        if (response.ok) {
            alert('Rental cancelled successfully');
            loadRentals();
        } else {
            const error = await response.json();
            alert(error.message || 'Failed to cancel');
            // Restore button
            btn.disabled = false;
            btn.innerHTML = originalText;
            btn.style.opacity = '1';
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error cancelling rental');
        btn.disabled = false;
        btn.innerHTML = originalText;
        btn.style.opacity = '1';
    }
}

// ============================================
// HANDLE REPORT ISSUE
// ============================================
async function handleMaintenance(e) {
    const btn = e.currentTarget;
    const rentalId = btn.dataset.id;
    const productName = btn.dataset.name;

    const issue = prompt(`Describe the issue with ${productName}:`);
    if (!issue || issue.trim() === "") return;

    const token = localStorage.getItem('token');
    if (!token) {
        alert('Please login first');
        window.location.href = 'login.html';
        return;
    }

    // Disable button
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Submitting...';
    btn.style.opacity = '0.7';

    try {
        const response = await fetch(`${API_URL}/api/maintenance`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({
                rentalId: rentalId,
                productName: productName,
                issue: issue,
                status: 'pending'
            })
        });

        if (response.ok) {
            alert('Maintenance request submitted successfully!');
        } else {
            alert('Failed to submit request');
        }
        
        // Restore button
        btn.disabled = false;
        btn.innerHTML = originalText;
        btn.style.opacity = '1';
        
    } catch (error) {
        console.error('Error:', error);
        alert('Error submitting request');
        btn.disabled = false;
        btn.innerHTML = originalText;
        btn.style.opacity = '1';
    }
}

// ============================================
// HANDLE SCHEDULE RETURN
// ============================================
async function handleReturn(e) {
    const btn = e.currentTarget;
    const rentalId = btn.dataset.id;
    const productName = btn.dataset.name;

    const today = new Date();
    const minDate = today.toISOString().split('T')[0];
    
    const returnDate = prompt(`Enter return date for ${productName} (YYYY-MM-DD):`, minDate);
    if (!returnDate || returnDate.trim() === "") return;

    const token = localStorage.getItem('token');
    if (!token) {
        alert('Please login first');
        window.location.href = 'login.html';
        return;
    }

    // Disable button
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Scheduling...';
    btn.style.opacity = '0.7';

    try {
        const response = await fetch(`${API_URL}/api/rentals/schedule-return/${rentalId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ returnDate: returnDate })
        });

        if (response.ok) {
            alert(`Return scheduled for ${returnDate}`);
        } else {
            alert('Failed to schedule return');
        }
        
        // Restore button
        btn.disabled = false;
        btn.innerHTML = originalText;
        btn.style.opacity = '1';
        
    } catch (error) {
        console.error('Error:', error);
        alert('Error scheduling return');
        btn.disabled = false;
        btn.innerHTML = originalText;
        btn.style.opacity = '1';
    }
}

// Make functions available globally
window.loadRentals = loadRentals;
  </script>
</body>
</html>
