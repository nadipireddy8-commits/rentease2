<!DOCTYPE html>
<html>
<head>
  <title>My Rentals - RentEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ============================================
       RENTALS PAGE SPECIFIC STYLES
       ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #e9ecf3 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Rentals Header */
    .rentals-header {
      background: linear-gradient(135deg, #4158D0, #C850C0);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }

    .rentals-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
      z-index: 1;
    }

    .header-title i {
      font-size: 1.8rem;
      color: white;
    }

    .header-title h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      margin: 0;
    }

    .orders-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      position: relative;
      z-index: 1;
      border: 1px solid rgba(255,255,255,0.3);
      cursor: pointer;
    }

    .orders-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    #rentalsList {
      padding: 2rem;
      min-height: 300px;
    }

    .loading {
      text-align: center;
      padding: 4rem 2rem;
    }

    .loading p {
      color: #6b7280;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .loading p::after {
      content: '';
      width: 24px;
      height: 24px;
      border: 3px solid #e5e7eb;
      border-top-color: #4158D0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .rental-card {
      background: #f9fafb;
      border-radius: 24px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid #e5e7eb;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .rental-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 30px -10px rgba(65, 88, 208, 0.15);
      border-color: #4158D0;
    }

    .rental-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 6px;
      height: 100%;
      background: linear-gradient(180deg, #4158D0, #C850C0);
      border-radius: 3px 0 0 3px;
    }

    .rental-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.2rem;
      padding-bottom: 1rem;
      border-bottom: 1px dashed #e5e7eb;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .rental-info {
      flex: 1;
    }

    .rental-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .rental-title i {
      color: #4158D0;
      font-size: 1.2rem;
    }

    .rental-id {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #6b7280;
      font-size: 0.8rem;
      background: #f3f4f6;
      padding: 0.3rem 1rem;
      border-radius: 30px;
    }

    .rental-id span {
      font-family: monospace;
      font-weight: 500;
    }

    .rental-details {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }

    .detail-item {
      flex: 1;
      min-width: 150px;
    }

    .detail-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #6b7280;
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
    }

    .detail-label i {
      color: #4158D0;
      width: 18px;
    }

    .detail-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1f2937;
      margin-left: 1.8rem;
    }

    .price-highlight {
      background: linear-gradient(135deg, #4158D0, #C850C0);
      color: white;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      display: inline-block;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .button-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .cancel-btn {
      background: white;
      color: #dc2626;
      border: 2px solid #dc2626;
      padding: 0.7rem 1.5rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .cancel-btn:hover {
      background: #dc2626;
      color: white;
    }

    .maintenance-btn {
      background: #f59e0b;
      color: white;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .maintenance-btn:hover {
      background: #d97706;
      transform: translateY(-2px);
    }

    .return-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .return-btn:hover {
      background: #059669;
      transform: translateY(-2px);
    }

    .empty-state, .login-prompt, .error-state {
      text-align: center;
      padding: 3rem 2rem;
    }

    .empty-state i, .login-prompt i, .error-state i {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    /* Responsive */
    @media screen and (max-width: 768px) {
      body { padding: 15px; }
      .rentals-header { padding: 1.2rem 1.5rem; }
      #rentalsList { padding: 1.5rem; }
    }

    @media screen and (max-width: 480px) {
      body { padding: 10px; }
      .rentals-header { flex-direction: column; align-items: flex-start; padding: 1rem 1.2rem; }
      .orders-btn { width: 100%; justify-content: center; }
      .button-group { flex-direction: column; }
      .cancel-btn, .maintenance-btn, .return-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="rentals-header">
      <div class="header-title">
        <i class="fas fa-box-open"></i>
        <h2>My Active Rentals</h2>
      </div>
      <a href="orders.html" class="orders-btn">
        <i class="fas fa-shopping-bag"></i> Orders
      </a>
    </div>
    <div id="rentalsList">
      <div class="loading">
        <p>Loading your rentals...</p>
      </div>
    </div>
  </div>

  <script >
    // ============================================
// RENTALS PAGE - COMPLETE FUNCTIONALITY
// ============================================

const API_URL = "https://rentease3-backend.onrender.com";

// ============================================
// LOAD RENTALS WHEN PAGE LOADS
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    loadRentals();
    fixOrdersButton();
});

// ============================================
// LOAD RENTALS FUNCTION
// ============================================
async function loadRentals() {
    const rentalsList = document.getElementById('rentalsList');
    if (!rentalsList) return;

    const userId = localStorage.getItem('userId');
    const token = localStorage.getItem('token');

    // Check if user is logged in
    if (!userId || !token) {
        rentalsList.innerHTML = `
            <div class="login-prompt">
                <i class="fas fa-sign-in-alt"></i>
                <p>Please log in to view your rentals</p>
                <a href="login.html" class="login-btn" style="display:inline-block; padding:0.8rem 2rem; background:linear-gradient(135deg,#4158D0,#C850C0); color:white; text-decoration:none; border-radius:30px; font-weight:600;">
                    <i class="fas fa-arrow-right"></i> Go to Login
                </a>
            </div>
        `;
        return;
    }

    try {
        const response = await fetch(`${API_URL}/api/rentals?userId=${userId}`, {
            headers: { 'Authorization': 'Bearer ' + token }
        });

        if (!response.ok) throw new Error('Failed to fetch rentals');

        const rentals = await response.json();
        rentalsList.innerHTML = '';

        if (!rentals || rentals.length === 0) {
            rentalsList.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <p>No active rentals found</p>
                    <a href="products.html" style="display:inline-block; padding:0.8rem 2rem; background:linear-gradient(135deg,#4158D0,#C850C0); color:white; text-decoration:none; border-radius:30px;">
                        <i class="fas fa-store"></i> Browse Products
                    </a>
                </div>
            `;
            return;
        }

        // Display each rental
        rentals.forEach(rental => {
            const rentalCard = document.createElement('div');
            rentalCard.className = 'rental-card';
            
            rentalCard.innerHTML = `
                <div class="rental-header">
                    <div class="rental-info">
                        <h3 class="rental-title">
                            <i class="fas fa-tag"></i>
                            ${rental.productName || 'Product'}
                        </h3>
                        <div class="rental-id">
                            <i class="fas fa-hashtag"></i>
                            <span>${rental._id.slice(-8)}</span>
                        </div>
                    </div>
                </div>

                <div class="rental-details">
                    <div class="detail-item">
                        <div class="detail-label">
                            <i class="far fa-calendar-alt"></i>
                            Rental Period
                        </div>
                        <div class="detail-value">
                            ${rental.days || 0} <small>days</small>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">
                            <i class="fas fa-rupee-sign"></i>
                            Total Price
                        </div>
                        <div class="detail-value price-highlight">
                            ₹${rental.totalPrice || 0}
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="cancel-btn" onclick="cancelRental('${rental._id}')">
                        <i class="fas fa-times-circle"></i> Cancel Rental
                    </button>
                    <button class="maintenance-btn" onclick="reportIssue('${rental._id}', '${rental.productName}')">
                        <i class="fas fa-tools"></i> Report Issue
                    </button>
                    <button class="return-btn" onclick="scheduleReturn('${rental._id}', '${rental.productName}')">
                        <i class="fas fa-calendar-alt"></i> Schedule Return
                    </button>
                </div>
            `;
            
            rentalsList.appendChild(rentalCard);
        });

    } catch (error) {
        console.error('Error loading rentals:', error);
        rentalsList.innerHTML = `
            <div class="error-state">
                <i class="fas fa-exclamation-circle"></i>
                <p>Failed to load rentals. Please try again.</p>
                <button onclick="loadRentals()" class="retry-btn" style="background:linear-gradient(135deg,#4158D0,#C850C0); color:white; border:none; padding:0.8rem 2rem; border-radius:30px; cursor:pointer;">
                    <i class="fas fa-redo-alt"></i> Try Again
                </button>
            </div>
        `;
    }
}

// ============================================
// CANCEL RENTAL FUNCTION
// ============================================
async function cancelRental(rentalId) {
    if (!confirm('Are you sure you want to cancel this rental?')) return;

    const token = localStorage.getItem('token');
    if (!token) {
        alert('Please login first');
        window.location.href = 'login.html';
        return;
    }

    // Find and disable the clicked button
    const buttons = document.querySelectorAll('.cancel-btn');
    let clickedButton = null;
    
    buttons.forEach(btn => {
        if (btn.getAttribute('onclick')?.includes(rentalId)) {
            clickedButton = btn;
            btn.disabled = true;
            btn.style.opacity = '0.5';
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cancelling...';
        }
    });

    try {
        const response = await fetch(`${API_URL}/api/rentals/${rentalId}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });

        if (response.ok) {
            alert('Rental cancelled successfully');
            loadRentals();
        } else {
            const error = await response.json();
            alert(error.message || 'Failed to cancel rental');
            if (clickedButton) {
                clickedButton.disabled = false;
                clickedButton.style.opacity = '1';
                clickedButton.innerHTML = '<i class="fas fa-times-circle"></i> Cancel Rental';
            }
        }
    } catch (error) {
        console.error('Error cancelling rental:', error);
        alert('Error cancelling rental. Please try again.');
        if (clickedButton) {
            clickedButton.disabled = false;
            clickedButton.style.opacity = '1';
            clickedButton.innerHTML = '<i class="fas fa-times-circle"></i> Cancel Rental';
        }
    }
}

// ============================================
// REPORT ISSUE (MAINTENANCE) FUNCTION
// ============================================
async function reportIssue(rentalId, productName) {
    const issue = prompt(`Describe the issue with ${productName}:`);
    if (!issue) return;

    const token = localStorage.getItem('token');
    if (!token) {
        alert('Please login first');
        window.location.href = 'login.html';
        return;
    }

    try {
        const response = await fetch(`${API_URL}/api/maintenance`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({
                rentalId: rentalId,
                productName: productName,
                issue: issue,
                status: 'pending'
            })
        });
        
        if (response.ok) {
            alert('Maintenance request submitted successfully! Our team will contact you soon.');
        } else {
            alert('Failed to submit request. Please try again.');
        }
    } catch (error) {
        console.error('Error submitting request:', error);
        alert('Error submitting request');
    }
}

// ============================================
// SCHEDULE RETURN FUNCTION
// ============================================
async function scheduleReturn(rentalId, productName) {
    const today = new Date();
    const minDate = today.toISOString().split('T')[0];
    
    const returnDate = prompt(`Enter return date for ${productName} (YYYY-MM-DD):`, minDate);
    if (!returnDate) return;

    const token = localStorage.getItem('token');
    if (!token) {
        alert('Please login first');
        window.location.href = 'login.html';
        return;
    }

    try {
        const response = await fetch(`${API_URL}/api/rentals/schedule-return/${rentalId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ returnDate: returnDate })
        });
        
        if (response.ok) {
            alert(`Return scheduled for ${returnDate}. Our team will contact you for pickup.`);
        } else {
            alert('Failed to schedule return. Please try again.');
        }
    } catch (error) {
        console.error('Error scheduling return:', error);
        alert('Error scheduling return');
    }
}

// ============================================
// FIX FOR MOBILE ORDERS BUTTON
// ============================================
function fixOrdersButton() {
    const ordersBtn = document.querySelector('.orders-btn');
    if (ordersBtn) {
        // Clone and replace to remove any existing listeners
        const newBtn = ordersBtn.cloneNode(true);
        ordersBtn.parentNode.replaceChild(newBtn, ordersBtn);
        
        newBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            console.log('Orders button clicked - navigating to orders.html');
            window.location.href = 'orders.html';
        });
        
        newBtn.addEventListener('touchstart', function(e) {
            console.log('Touch detected on Orders button');
        });
    }
    
    // Add CSS to ensure button is clickable
    const style = document.createElement('style');
    style.textContent = `
        .orders-btn {
            cursor: pointer !important;
            pointer-events: auto !important;
            -webkit-tap-highlight-color: transparent !important;
        }
    `;
    document.head.appendChild(style);
}

// Make functions globally available
window.cancelRental = cancelRental;
window.reportIssue = reportIssue;
window.scheduleReturn = scheduleReturn;
window.loadRentals = loadRentals;
  </script>
</body>
</html>
