<!DOCTYPE html>
<html>
<head>
  <title>My Rentals - RentEase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* ============================================
       RENTEASE RENTALS PAGE - MODERN APP DESIGN
       ============================================ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #e9ecf3 100%);
      min-height: 100vh;
      padding: 20px;
    }

    /* Main Container */
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header */
    .container h2 {
      background: linear-gradient(135deg, #4158D0, #C850C0);
      color: white;
      padding: 1.8rem 2rem;
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }

    .container h2::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .container h2 i {
      font-size: 2rem;
      position: relative;
      z-index: 1;
    }

    .container h2 span {
      position: relative;
      z-index: 1;
    }

    /* Rentals List Container */
    #rentalsList {
      padding: 2rem;
      min-height: 300px;
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 4rem 2rem;
    }

    .loading p {
      color: #6b7280;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .loading p::after {
      content: '';
      width: 24px;
      height: 24px;
      border: 3px solid #e5e7eb;
      border-top-color: #4158D0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Rental Card */
    .rental-card {
      background: #f9fafb;
      border-radius: 24px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid #e5e7eb;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .rental-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 30px -10px rgba(65, 88, 208, 0.15);
      border-color: #4158D0;
    }

    .rental-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 6px;
      height: 100%;
      background: linear-gradient(180deg, #4158D0, #C850C0);
      border-radius: 3px 0 0 3px;
    }

    /* Rental Header */
    .rental-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.2rem;
      padding-bottom: 1rem;
      border-bottom: 1px dashed #e5e7eb;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .rental-info {
      flex: 1;
    }

    .rental-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .rental-title i {
      color: #4158D0;
      font-size: 1.2rem;
    }

    .rental-id {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #6b7280;
      font-size: 0.85rem;
      background: #f3f4f6;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      display: inline-flex;
    }

    .rental-id i {
      color: #4158D0;
      font-size: 0.8rem;
    }

    .rental-id span {
      font-family: monospace;
      font-weight: 500;
    }

    /* Rental Details */
    .rental-details {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }

    .detail-item {
      flex: 1;
      min-width: 150px;
    }

    .detail-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
    }

    .detail-label i {
      color: #4158D0;
      width: 18px;
    }

    .detail-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1f2937;
      margin-left: 1.8rem;
    }

    .detail-value small {
      font-size: 0.9rem;
      font-weight: 400;
      color: #6b7280;
      margin-left: 0.3rem;
    }

    /* Price Highlight */
    .price-highlight {
      background: linear-gradient(135deg, #4158D0, #C850C0);
      color: white;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      display: inline-block;
      font-weight: 600;
      font-size: 1.2rem;
    }

    /* Cancel Button */
    .cancel-btn {
      background: white;
      color: #dc2626;
      border: 2px solid #dc2626;
      padding: 0.8rem 2rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      max-width: 200px;
      margin-top: 1rem;
    }

    .cancel-btn:hover {
      background: #dc2626;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(220, 38, 38, 0.3);
    }

    .cancel-btn i {
      font-size: 1rem;
    }

    .cancel-btn:active {
      transform: translateY(0);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
    }

    .empty-state i {
      font-size: 4rem;
      color: #9ca3af;
      margin-bottom: 1rem;
    }

    .empty-state p {
      color: #4b5563;
      font-size: 1.2rem;
      margin-bottom: 2rem;
    }

    .empty-state a {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, #4158D0, #C850C0);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .empty-state a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(65, 88, 208, 0.3);
    }

    /* Login Prompt */
    .login-prompt {
      text-align: center;
      padding: 4rem 2rem;
    }

    .login-prompt i {
      font-size: 4rem;
      color: #9ca3af;
      margin-bottom: 1rem;
    }

    .login-prompt p {
      color: #4b5563;
      font-size: 1.2rem;
      margin-bottom: 2rem;
    }

    .login-btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, #4158D0, #C850C0);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(65, 88, 208, 0.3);
    }

    /* Error State */
    .error-state {
      text-align: center;
      padding: 4rem 2rem;
    }

    .error-state i {
      font-size: 4rem;
      color: #dc2626;
      margin-bottom: 1rem;
    }

    .error-state p {
      color: #4b5563;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    .retry-btn {
      background: linear-gradient(135deg, #4158D0, #C850C0);
      color: white;
      border: none;
      padding: 1rem 2.5rem;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(65, 88, 208, 0.3);
    }

    /* ========== RESPONSIVE DESIGN ========== */

    /* Tablet */
    @media screen and (max-width: 768px) {
      .container {
        margin: 0 1rem;
      }

      .container h2 {
        padding: 1.5rem;
        font-size: 1.5rem;
      }

      #rentalsList {
        padding: 1.5rem;
      }

      .rental-header {
        flex-direction: column;
      }

      .rental-details {
        gap: 1.5rem;
      }

      .cancel-btn {
        max-width: 100%;
      }
    }

    /* Mobile */
    @media screen and (max-width: 480px) {
      body {
        padding: 10px;
      }

      .container h2 {
        padding: 1.2rem;
        font-size: 1.3rem;
      }

      .container h2 i {
        font-size: 1.5rem;
      }

      #rentalsList {
        padding: 1rem;
      }

      .rental-card {
        padding: 1.2rem;
      }

      .rental-title {
        font-size: 1.2rem;
      }

      .rental-id {
        font-size: 0.75rem;
        padding: 0.2rem 0.8rem;
      }

      .rental-details {
        flex-direction: column;
        gap: 1rem;
      }

      .detail-item {
        min-width: 100%;
      }

      .detail-label {
        font-size: 0.85rem;
      }

      .detail-value {
        font-size: 1.2rem;
        margin-left: 1.8rem;
      }

      .price-highlight {
        font-size: 1rem;
      }

      .cancel-btn {
        padding: 0.7rem;
        font-size: 0.95rem;
      }

      .empty-state i,
      .login-prompt i,
      .error-state i {
        font-size: 3rem;
      }

      .empty-state p,
      .login-prompt p,
      .error-state p {
        font-size: 1rem;
      }
    }

    /* Small Mobile */
    @media screen and (max-width: 360px) {
      .container h2 {
        font-size: 1.2rem;
      }

      .rental-title {
        font-size: 1.1rem;
      }

      .rental-id span {
        max-width: 100px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    }

    /* Dark Mode */
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      }

      .container {
        background: #1e1e2f;
      }

      .rental-card {
        background: #2d2d44;
        border-color: #3d3d5c;
      }

      .rental-title {
        color: #f3f4f6;
      }

      .rental-id {
        background: #1e1e2f;
        color: #9ca3af;
      }

      .detail-label {
        color: #9ca3af;
      }

      .detail-value {
        color: #f3f4f6;
      }

      .loading p {
        color: #9ca3af;
      }

      .empty-state p,
      .login-prompt p,
      .error-state p {
        color: #9ca3af;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>
      <i class="fas fa-box-open"></i>
      <span>My Active Rentals</span>
    </h2>
    <div id="rentalsList">
      <div class="loading">
        <p>Loading your rentals...</p>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // RENTALS PAGE - COMPLETE FUNCTIONALITY
    // ============================================

    const API_URL = "https://rentease3-backend.onrender.com";

    // Load rentals when page loads
    document.addEventListener('DOMContentLoaded', function() {
      loadRentals();
    });

    // ============================================
    // LOAD RENTALS FUNCTION
    // ============================================
    async function loadRentals() {
      const rentalsList = document.getElementById('rentalsList');
      
      if (!rentalsList) return;

      const userId = localStorage.getItem('userId');
      const token = localStorage.getItem('token');

      // Check if user is logged in
      if (!userId || !token) {
        rentalsList.innerHTML = `
          <div class="login-prompt">
            <i class="fas fa-sign-in-alt"></i>
            <p>Please log in to view your rentals</p>
            <a href="login.html" class="login-btn">
              <i class="fas fa-arrow-right"></i> Go to Login
            </a>
          </div>
        `;
        return;
      }

      try {
        const response = await fetch(`${API_URL}/api/rentals?userId=${userId}`, {
          headers: {
            'Authorization': 'Bearer ' + token
          }
        });

        if (!response.ok) {
          throw new Error('Failed to fetch rentals');
        }

        const rentals = await response.json();
        
        // Clear loading state
        rentalsList.innerHTML = '';

        // Check if no rentals
        if (!rentals || rentals.length === 0) {
          rentalsList.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-box-open"></i>
              <p>No active rentals found</p>
              <a href="products.html">
                <i class="fas fa-store"></i> Browse Products
              </a>
            </div>
          `;
          return;
        }

        // Display each rental
        rentals.forEach(rental => {
          const rentalCard = document.createElement('div');
          rentalCard.className = 'rental-card';
          
          rentalCard.innerHTML = `
            <div class="rental-header">
              <div class="rental-info">
                <h3 class="rental-title">
                  <i class="fas fa-tag"></i>
                  ${rental.productName || 'Product'}
                </h3>
                <div class="rental-id">
                  <i class="fas fa-hashtag"></i>
                  <span>${rental._id}</span>
                </div>
              </div>
            </div>

            <div class="rental-details">
              <div class="detail-item">
                <div class="detail-label">
                  <i class="far fa-calendar-alt"></i>
                  Rental Period
                </div>
                <div class="detail-value">
                  ${rental.days || 0} <small>days</small>
                </div>
              </div>

              <div class="detail-item">
                <div class="detail-label">
                  <i class="fas fa-rupee-sign"></i>
                  Total Price
                </div>
                <div class="detail-value price-highlight">
                  ₹${rental.totalPrice || 0}
                </div>
              </div>
            </div>

            <button class="cancel-btn" onclick="cancelRental('${rental._id}')">
              <i class="fas fa-times-circle"></i>
              Cancel Rental
            </button>
          `;
          
          rentalsList.appendChild(rentalCard);
        });

      } catch (error) {
        console.error('Error loading rentals:', error);
        rentalsList.innerHTML = `
          <div class="error-state">
            <i class="fas fa-exclamation-circle"></i>
            <p>Failed to load rentals. Please try again.</p>
            <button onclick="loadRentals()" class="retry-btn">
              <i class="fas fa-redo-alt"></i> Try Again
            </button>
          </div>
        `;
      }
    }

    // ============================================
    // CANCEL RENTAL FUNCTION
    // ============================================
    async function cancelRental(rentalId) {
      if (!confirm('Are you sure you want to cancel this rental?')) {
        return;
      }

      const token = localStorage.getItem('token');
      
      if (!token) {
        alert('Please login first');
        window.location.href = 'login.html';
        return;
      }

      // Find and disable the clicked button to prevent double clicks
      const buttons = document.querySelectorAll('.cancel-btn');
      let clickedButton = null;
      
      buttons.forEach(btn => {
        if (btn.getAttribute('onclick')?.includes(rentalId)) {
          clickedButton = btn;
          btn.disabled = true;
          btn.style.opacity = '0.5';
          btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cancelling...';
        }
      });

      try {
        const response = await fetch(`${API_URL}/api/rentals/${rentalId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': 'Bearer ' + token
          }
        });

        if (response.ok) {
          alert('Rental cancelled successfully');
          loadRentals(); // Reload the list
        } else {
          const error = await response.json();
          alert(error.message || 'Failed to cancel rental');
          
          // Re-enable button if failed
          if (clickedButton) {
            clickedButton.disabled = false;
            clickedButton.style.opacity = '1';
            clickedButton.innerHTML = '<i class="fas fa-times-circle"></i> Cancel Rental';
          }
        }
      } catch (error) {
        console.error('Error cancelling rental:', error);
        alert('Error cancelling rental. Please try again.');
        
        // Re-enable button if error
        if (clickedButton) {
          clickedButton.disabled = false;
          clickedButton.style.opacity = '1';
          clickedButton.innerHTML = '<i class="fas fa-times-circle"></i> Cancel Rental';
        }
      }
    }

    // Make cancelRental globally available
    window.cancelRental = cancelRental;
  </script>
</body>
</html>
